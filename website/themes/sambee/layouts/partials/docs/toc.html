{{/* Purpose: Render the right-hand table of contents rail when article headings exist. */}}
{{ $toc := .TableOfContents }}
{{ if gt (len (findRE `<a\s+href=` $toc)) 0 }}
<aside class="docs-toc" aria-label="On this page">
  <div class="docs-toc-inner">
    <div class="docs-toc-header">
      <span class="docs-toc-rule" aria-hidden="true"></span>
      <span class="docs-toc-title">On this page</span>
    </div>
    <div class="table-of-content docs-toc-body">
      {{ $toc }}
    </div>
  </div>
</aside>
{{ end }}

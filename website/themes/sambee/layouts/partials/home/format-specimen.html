{{/* Purpose: Draws a compact file-type glyph for the homepage preview-support grid. */}}
{{ $label := upper .label }}
<svg class="{{ .class }}" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  {{/* Every glyph starts from the same folded-document silhouette. */}}
  <path d="M9 3.5H19.5L25 9V26.5C25 27.6046 24.1046 28.5 23 28.5H9C7.89543 28.5 7 27.6046 7 26.5V5.5C7 4.39543 7.89543 3.5 9 3.5Z" class="format-sheet" stroke="currentColor" stroke-width="1.5"/>
  <path d="M19 3.5V9.5H25" class="format-fold" stroke="currentColor" stroke-width="1.5"/>

  {{/* Use bespoke marks for common formats; fall back to a text label for the rest. */}}
  {{ if eq $label "PSD" }}
  <text x="10" y="21" class="format-text format-text-wide" fill="currentColor">PSD</text>
  {{ else if eq $label "TIFF" }}
  <circle cx="16" cy="17" r="4.25" class="format-detail" stroke="currentColor" stroke-width="1.5"/>
  <circle cx="16" cy="17" r="1.25" fill="currentColor"/>
  {{ else if eq $label "HEIC" }}
  <path d="M11 20L16 14L21 20" class="format-detail" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"/>
  <path d="M11 13.5H21" class="format-detail" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"/>
  {{ else if eq $label "EPS" }}
  <path d="M16 11L20.5 20H11.5L16 11Z" class="format-detail" stroke="currentColor" stroke-width="1.5" stroke-linejoin="miter"/>
  {{ else if eq $label "AI" }}
  <text x="12" y="21" class="format-text" fill="currentColor">AI</text>
  {{ else if eq $label "PDF" }}
  <path d="M12 12.5H20" class="format-detail" stroke="currentColor" stroke-width="1.5"/>
  <path d="M12 16H19" class="format-detail" stroke="currentColor" stroke-width="1.5"/>
  <path d="M12 19.5H17" class="format-detail" stroke="currentColor" stroke-width="1.5"/>
  {{ else if eq $label "MD" }}
  <path d="M11.5 20V13.5L15.2 17.2L18.8 13.5V20" class="format-detail" stroke="currentColor" stroke-width="1.5" stroke-linejoin="miter"/>
  <path d="M20.5 13.5L17.8 20" class="format-detail" stroke="currentColor" stroke-width="1.5"/>
  {{ else if eq $label "JPG" }}
  <path d="M11.5 20.5L15.25 16.75L18 19.5L20.5 17L22 18.5V22H10V20.5H11.5Z" class="format-detail" stroke="currentColor" stroke-width="1.5" stroke-linejoin="miter"/>
  <circle cx="20" cy="12.5" r="1.5" fill="currentColor"/>
  {{ else if eq $label "XLS" }}
  <path d="M11.5 12.5H20.5" class="format-detail" stroke="currentColor" stroke-width="1.5"/>
  <path d="M11.5 16H20.5" class="format-detail" stroke="currentColor" stroke-width="1.5"/>
  <path d="M11.5 19.5H20.5" class="format-detail" stroke="currentColor" stroke-width="1.5"/>
  <path d="M15 12.5V22" class="format-detail" stroke="currentColor" stroke-width="1.5"/>
  {{ else }}
  <text x="10" y="21" class="format-text format-text-wide" fill="currentColor">{{ $label }}</text>
  {{ end }}
</svg>

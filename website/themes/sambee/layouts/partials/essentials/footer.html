{{ $isHome := .IsHome }}
<footer class="border-t-2 border-clr-rule-strong bg-clr-surface-page py-0 dark:border-clr-darkmode-rule-strong dark:bg-clr-darkmode-surface-page">
  <div class="container {{ if $isHome }}flex flex-col items-center justify-between gap-4 px-5 py-8 text-[0.62rem] uppercase tracking-[0.22em] md:grid md:grid-cols-[auto_1fr_auto] md:items-end md:gap-6 md:px-6 md:py-10{{ else }}grid gap-0 border-x border-clr-rule-soft px-6 py-8 text-[0.68rem] uppercase tracking-[0.18em] dark:border-clr-darkmode-rule-soft md:px-8 md:py-10 lg:grid-cols-[minmax(220px,0.75fr)_minmax(0,1fr)_auto]{{ end }}">
    <div class="flex flex-col gap-2 text-center md:text-left{{ if not $isHome }} lg:border-r lg:border-clr-rule-soft dark:lg:border-clr-darkmode-rule-soft{{ end }}">
      <div class="text-sm font-bold tracking-[0.08em] text-clr-text-dark dark:text-clr-darkmode-text-dark{{ if $isHome }} tracking-[0.02em]{{ end }}">{{ site.Title | upper }}</div>
      <div class="text-clr-text-light dark:text-clr-darkmode-text-light{{ if $isHome }} font-tertiary text-[0.62rem] tracking-[0.16em]{{ end }}">© {{ now.Year }} SAMBEE ARCHIVAL SYSTEMS</div>
    </div>

    {{ if $isHome }}
    <nav class="flex flex-wrap justify-center gap-x-4 gap-y-2 text-[0.58rem] text-clr-text-light dark:text-clr-darkmode-text-light md:justify-center md:gap-x-6 md:gap-y-3 md:text-[0.62rem]" aria-label="Footer utility">
      <a class="underline underline-offset-[3px] transition-colors duration-200 hover:text-clr-text-dark dark:hover:text-clr-darkmode-text-dark" href="{{ "/docs/" | relLangURL }}">Docs</a>
      <a class="underline underline-offset-[3px] transition-colors duration-200 hover:text-clr-text-dark dark:hover:text-clr-darkmode-text-dark" href="{{ "/docs/1.0/end-user/" | relLangURL }}">End-User</a>
      <a class="underline underline-offset-[3px] transition-colors duration-200 hover:text-clr-text-dark dark:hover:text-clr-darkmode-text-dark" href="{{ "/docs/1.0/admin/" | relLangURL }}">Admin</a>
      <a class="underline underline-offset-[3px] transition-colors duration-200 hover:text-clr-text-dark dark:hover:text-clr-darkmode-text-dark" href="{{ "/docs/1.0/developer/" | relLangURL }}">Developer</a>
    </nav>

    <div class="flex items-center gap-2.5 text-[0.62rem] text-clr-action-text dark:text-clr-darkmode-action-text md:justify-self-end md:text-[0.7rem]">
      <span class="font-tertiary text-sm font-bold leading-none text-clr-action-text dark:text-clr-darkmode-action-text" aria-hidden="true">&gt;_</span>
      <span class="font-tertiary">SYST_OK_200</span>
    </div>
    {{ else }}
    <div class="flex flex-col items-center justify-center gap-5 border-t border-clr-rule-soft pt-6 dark:border-clr-darkmode-rule-soft md:flex-row md:justify-between md:border-t-0 md:pt-0 lg:px-8">
      {{ if site.Menus.footer }}
      <div class="spaced-list flex flex-wrap justify-center gap-x-8 gap-y-3 text-clr-text-light dark:text-clr-darkmode-text-light">
        {{ range site.Menus.footer }}
        <a class="underline underline-offset-2 transition-colors duration-200 hover:text-clr-text-dark dark:hover:text-clr-darkmode-text-dark" href="{{ .URL | relLangURL }}">{{ .Name }}</a>
        {{ end }}
      </div>
      {{ end }}
      <div class="flex items-center gap-2 text-clr-action-text dark:text-clr-darkmode-action-text">
        <span class="block h-2.5 w-2.5 border border-clr-action-fill dark:border-clr-darkmode-action-fill" aria-hidden="true"></span>
        <span class="font-tertiary">SYST_OK_200</span>
      </div>
    </div>
    {{ end }}
  </div>
</footer>

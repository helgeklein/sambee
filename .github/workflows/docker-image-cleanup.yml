name: "Maintenance: Cleanup Untagged Docker Image Versions"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '26 3 * * 0'
  workflow_dispatch:

concurrency:
  group: cleanup-docker-image-untagged-versions
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
    - name: Delete old untagged GHCR image versions
      uses: actions/delete-package-versions@v5
      with:
        owner: ${{ github.repository_owner }}
        package-name: sambee
        package-type: container
        min-versions-to-keep: 10
        delete-only-untagged-versions: 'true'

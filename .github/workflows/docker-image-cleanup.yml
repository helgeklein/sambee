name: "Maintenance: Cleanup Untagged Docker Package Versions"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '26 3 * * 0'
  workflow_dispatch:

concurrency:
  group: cleanup-docker-untagged-package-versions
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up crane
      uses: ./.github/actions/setup-crane
      with:
        install-dir: ${{ runner.temp }}/bin

    - name: Log in to GHCR with crane
      shell: bash
      run: crane auth login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"

    - name: Delete old unreferenced untagged GHCR versions
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      shell: bash
      run: |
        owner_lower="$(printf '%s' "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
        python3 .github/scripts/cleanup_signature_container_versions.py \
          --owner "${{ github.repository_owner }}" \
          --image-package-name sambee \
          --signature-package-name sambee-signatures \
          --image-keep-count 10

        python3 .github/scripts/cleanup_untagged_container_versions.py \
          --owner "${{ github.repository_owner }}" \
          --package-name sambee \
          --image-name "ghcr.io/$owner_lower/sambee" \
          --keep-count 10

        python3 .github/scripts/cleanup_untagged_container_versions.py \
          --owner "${{ github.repository_owner }}" \
          --package-name sambee-signatures \
          --image-name "ghcr.io/$owner_lower/sambee-signatures" \
          --keep-count 10

name: "Maintenance: Backfill Docker Release Tags"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing immutable Git tag to backfill, for example v0.7.0.
        required: true
        type: string

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      checkout_ref: ${{ steps.metadata.outputs.checkout_ref }}
      release_type: ${{ steps.metadata.outputs.release_type }}
      version: ${{ steps.metadata.outputs.version }}
      major_minor: ${{ steps.metadata.outputs.major_minor }}
      prerelease_series: ${{ steps.metadata.outputs.prerelease_series }}
      image_name: ${{ steps.metadata.outputs.image_name }}
      full_sha: ${{ steps.metadata.outputs.full_sha }}
      source_url: ${{ steps.metadata.outputs.source_url }}
    steps:
    - name: Checkout tagged code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        ref: ${{ inputs.release_tag }}

    - name: Sync and verify version metadata
      uses: ./.github/actions/sync-version-check

    - name: Resolve backfill metadata
      id: metadata
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      shell: bash
      run: |
        release_payload="$(gh api repos/${GITHUB_REPOSITORY}/releases/tags/${{ inputs.release_tag }})"
        prerelease="$(jq -r '.prerelease' <<<"$release_payload")"

        version="$(tr -d '[:space:]' < VERSION)"
        expected_tag="v$version"
        if [[ "${{ inputs.release_tag }}" != "$expected_tag" ]]; then
          echo "Release tag $expected_tag expected, got ${{ inputs.release_tag }}" >&2
          exit 1
        fi

        full_sha="$(git rev-parse HEAD)"
        major_minor="$(printf '%s' "$version" | cut -d. -f1-2)"
        owner_lower="$(printf '%s' "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"

        if [[ "$prerelease" == "true" ]]; then
          release_type="beta"
          prerelease_series="${major_minor}-beta"
        else
          release_type="stable"
          prerelease_series=""
        fi

        echo "checkout_ref=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
        echo "release_type=$release_type" >> "$GITHUB_OUTPUT"
        echo "version=$version" >> "$GITHUB_OUTPUT"
        echo "major_minor=$major_minor" >> "$GITHUB_OUTPUT"
        echo "prerelease_series=$prerelease_series" >> "$GITHUB_OUTPUT"
        echo "image_name=ghcr.io/$owner_lower/sambee" >> "$GITHUB_OUTPUT"
        echo "full_sha=$full_sha" >> "$GITHUB_OUTPUT"
        echo "source_url=https://github.com/${GITHUB_REPOSITORY}" >> "$GITHUB_OUTPUT"

  resolve-candidate-artifact:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      candidate_digest: ${{ steps.resolve.outputs.candidate_digest }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up crane
      uses: ./.github/actions/setup-crane
      with:
        install-dir: ${{ runner.temp }}/bin

    - name: Log in to GHCR with crane
      shell: bash
      run: crane auth login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"

    - name: Resolve candidate digest
      id: resolve
      shell: bash
      run: |
        candidate_digest="$(crane digest "${{ needs.prepare.outputs.image_name }}:sha-${{ needs.prepare.outputs.full_sha }}")"
        echo "candidate_digest=$candidate_digest" >> "$GITHUB_OUTPUT"

  verify-candidate-artifact:
    needs: [prepare, resolve-candidate-artifact]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up crane
      uses: ./.github/actions/setup-crane
      with:
        install-dir: ${{ runner.temp }}/bin

    - name: Log in to GHCR with crane
      shell: bash
      run: crane auth login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"

    - name: Verify candidate artifact metadata
      shell: bash
      run: |
        bash .github/scripts/verify_candidate_image.sh \
          --image-ref "${{ needs.prepare.outputs.image_name }}@${{ needs.resolve-candidate-artifact.outputs.candidate_digest }}" \
          --expected-revision "${{ needs.prepare.outputs.full_sha }}" \
          --expected-version "${{ needs.prepare.outputs.version }}" \
          --expected-source "${{ needs.prepare.outputs.source_url }}"

    - name: Verify candidate attestations
      shell: bash
      run: |
        bash .github/scripts/verify_candidate_attestations.sh \
          --image-ref "${{ needs.prepare.outputs.image_name }}@${{ needs.resolve-candidate-artifact.outputs.candidate_digest }}"

  publish-release-tags:
    needs: [prepare, resolve-candidate-artifact, verify-candidate-artifact]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up crane
      uses: ./.github/actions/setup-crane
      with:
        install-dir: ${{ runner.temp }}/bin

    - name: Log in to GHCR with crane
      shell: bash
      run: crane auth login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"

    - name: Attach immutable release tags
      shell: bash
      run: |
        tags=("${{ needs.prepare.outputs.version }}")
        if [[ "${{ needs.prepare.outputs.release_type }}" == "stable" ]]; then
          tags+=("${{ needs.prepare.outputs.major_minor }}")
        else
          tags+=("${{ needs.prepare.outputs.prerelease_series }}")
        fi

        args=()
        for tag in "${tags[@]}"; do
          args+=(--tag "$tag")
        done

        bash .github/scripts/promote_container_image.sh \
          --image-name "${{ needs.prepare.outputs.image_name }}" \
          --source-digest "${{ needs.resolve-candidate-artifact.outputs.candidate_digest }}" \
          "${args[@]}"

  promote-channel-tags:
    needs: [prepare, resolve-candidate-artifact, publish-release-tags]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up crane
      uses: ./.github/actions/setup-crane
      with:
        install-dir: ${{ runner.temp }}/bin

    - name: Log in to GHCR with crane
      shell: bash
      run: crane auth login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"

    - name: Promote channel tag
      shell: bash
      run: |
        bash .github/scripts/promote_container_image.sh \
          --image-name "${{ needs.prepare.outputs.image_name }}" \
          --source-digest "${{ needs.resolve-candidate-artifact.outputs.candidate_digest }}" \
          --tag "${{ needs.prepare.outputs.release_type }}"

  sign-and-attest:
    needs: [prepare, resolve-candidate-artifact, promote-channel-tags]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
    - name: Install Cosign
      uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

    - name: Sign promoted digest
      shell: bash
      run: cosign sign --yes "${{ needs.prepare.outputs.image_name }}@${{ needs.resolve-candidate-artifact.outputs.candidate_digest }}"

name: "Maintenance: Backfill Docker Release Tags"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_TITLE: Sambee

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing immutable Git tag to backfill, for example v0.7.0.
        required: true
        type: string

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      checkout_ref: ${{ steps.metadata.outputs.checkout_ref }}
      release_type: ${{ steps.metadata.outputs.release_type }}
      version: ${{ steps.metadata.outputs.version }}
      major_minor: ${{ steps.metadata.outputs.major_minor }}
      prerelease_series: ${{ steps.metadata.outputs.prerelease_series }}
      image_description: ${{ steps.metadata.outputs.image_description }}
      image_name: ${{ steps.metadata.outputs.image_name }}
      signature_repository: ${{ steps.metadata.outputs.signature_repository }}
      full_sha: ${{ steps.metadata.outputs.full_sha }}
      source_url: ${{ steps.metadata.outputs.source_url }}
    steps:
    - name: Checkout tagged code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        ref: ${{ inputs.release_tag }}

    - name: Sync and verify version metadata
      uses: ./.github/actions/sync-version-check

    - name: Resolve backfill metadata
      id: metadata
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      shell: bash
      run: |
        release_payload="$(gh api repos/${GITHUB_REPOSITORY}/releases/tags/${{ inputs.release_tag }})"
        prerelease="$(jq -r '.prerelease' <<<"$release_payload")"

        version="$(tr -d '[:space:]' < VERSION)"
        expected_tag="v$version"
        if [[ "${{ inputs.release_tag }}" != "$expected_tag" ]]; then
          echo "Release tag $expected_tag expected, got ${{ inputs.release_tag }}" >&2
          exit 1
        fi

        full_sha="$(git rev-parse HEAD)"
        major_minor="$(printf '%s' "$version" | cut -d. -f1-2)"
        owner_lower="$(printf '%s' "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
        image_description="$(bash .github/scripts/read_website_description.sh)"

        if [[ "$prerelease" == "true" ]]; then
          release_type="beta"
          prerelease_series="${major_minor}-beta"
        else
          release_type="stable"
          prerelease_series=""
        fi

        echo "checkout_ref=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
        echo "release_type=$release_type" >> "$GITHUB_OUTPUT"
        echo "version=$version" >> "$GITHUB_OUTPUT"
        echo "major_minor=$major_minor" >> "$GITHUB_OUTPUT"
        echo "prerelease_series=$prerelease_series" >> "$GITHUB_OUTPUT"
        {
          echo 'image_description<<EOF'
          echo "$image_description"
          echo 'EOF'
        } >> "$GITHUB_OUTPUT"
        echo "image_name=ghcr.io/$owner_lower/sambee" >> "$GITHUB_OUTPUT"
        echo "signature_repository=ghcr.io/$owner_lower/sambee-signatures" >> "$GITHUB_OUTPUT"
        echo "full_sha=$full_sha" >> "$GITHUB_OUTPUT"
        echo "source_url=https://github.com/${GITHUB_REPOSITORY}" >> "$GITHUB_OUTPUT"

  resolve-candidate-artifact:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      candidate_digest: ${{ steps.resolve.outputs.candidate_digest }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up crane
      uses: ./.github/actions/setup-crane
      with:
        install-dir: ${{ runner.temp }}/bin

    - name: Log in to GHCR with crane
      shell: bash
      run: crane auth login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"

    - name: Resolve candidate digest
      id: resolve
      shell: bash
      run: |
        candidate_digest="$(crane digest "${{ needs.prepare.outputs.image_name }}:sha-${{ needs.prepare.outputs.full_sha }}")"
        echo "candidate_digest=$candidate_digest" >> "$GITHUB_OUTPUT"

  ensure-candidate-metadata-bundle:
    needs: [prepare, resolve-candidate-artifact]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout tagged code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        ref: ${{ needs.prepare.outputs.checkout_ref }}

    - name: Sync and verify version metadata
      uses: ./.github/actions/sync-version-check

    - name: Write build metadata files
      shell: bash
      run: git rev-parse HEAD > GIT_COMMIT

    - name: Set up QEMU
      uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

    - name: Set up crane
      uses: ./.github/actions/setup-crane
      with:
        install-dir: ${{ runner.temp }}/bin

    - name: Set up ORAS
      uses: ./.github/actions/setup-oras
      with:
        install-dir: ${{ runner.temp }}/bin

    - name: Log in to GHCR with crane
      shell: bash
      run: crane auth login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"

    - name: Log in to GHCR with ORAS
      shell: bash
      run: oras login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"

    - name: Check whether metadata bundle already exists
      id: bundle
      shell: bash
      run: |
        metadata_tag="$(bash .github/scripts/metadata_bundle_tag.sh --image-digest "${{ needs.resolve-candidate-artifact.outputs.candidate_digest }}")"
        if oras pull "${{ needs.prepare.outputs.signature_repository }}:${metadata_tag}" --output "${{ runner.temp }}/existing-metadata-bundle" >/dev/null 2>&1; then
          echo "exists=true" >> "$GITHUB_OUTPUT"
        else
          echo "exists=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Prepare attested export metadata
      if: ${{ steps.bundle.outputs.exists != 'true' }}
      id: image
      shell: bash
      run: |
        image_ref="${{ needs.prepare.outputs.image_name }}@${{ needs.resolve-candidate-artifact.outputs.candidate_digest }}"
        config_json="$(crane config "$image_ref")"

        label() {
          jq -r --arg key "$1" '.config.Labels[$key] // empty' <<<"$config_json"
        }

        created="$(label org.opencontainers.image.created)"
        description="$(label org.opencontainers.image.description)"
        ref_name="$(label org.opencontainers.image.ref.name)"
        revision="$(label org.opencontainers.image.revision)"
        source_url="$(label org.opencontainers.image.source)"
        title="$(label org.opencontainers.image.title)"
        version="$(label org.opencontainers.image.version)"

        for value_name in created description ref_name revision source_url title version; do
          if [[ -z "${!value_name}" ]]; then
            echo "Candidate image is missing required OCI label for metadata backfill: $value_name" >&2
            exit 1
          fi
        done

        bash .github/scripts/write_docker_image_metadata_outputs.sh \
          --created "$created" \
          --description "$description" \
          --ref-name "$ref_name" \
          --revision "$revision" \
          --source-url "$source_url" \
          --title "$title" \
          --version "$version"

    - name: Export attested OCI layout for bundle backfill
      if: ${{ steps.bundle.outputs.exists != 'true' }}
      uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
      with:
        annotations: ${{ steps.image.outputs.annotations }}
        context: .
        file: ./Dockerfile
        platforms: linux/amd64,linux/arm64
        outputs: type=oci,dest=${{ runner.temp }}/attested-image,tar=false,oci-mediatypes=false
        labels: ${{ steps.image.outputs.labels }}
        provenance: true
        sbom: true

    - name: Extract metadata bundle for backfill
      if: ${{ steps.bundle.outputs.exists != 'true' }}
      shell: bash
      run: |
        bundle_dir="${{ runner.temp }}/metadata-bundle"
        bash .github/scripts/extract_metadata_bundle_from_oci.sh \
          --oci-layout "${{ runner.temp }}/attested-image" \
          --image-ref "${{ needs.prepare.outputs.image_name }}@${{ needs.resolve-candidate-artifact.outputs.candidate_digest }}" \
          --metadata-repository "${{ needs.prepare.outputs.signature_repository }}" \
          --version "${{ needs.prepare.outputs.version }}" \
          --revision "${{ needs.prepare.outputs.full_sha }}" \
          --source-url "${{ needs.prepare.outputs.source_url }}" \
          --output-dir "$bundle_dir"

    - name: Publish metadata bundle for backfill
      if: ${{ steps.bundle.outputs.exists != 'true' }}
      shell: bash
      run: |
        bash .github/scripts/publish_metadata_bundle.sh \
          --bundle-dir "${{ runner.temp }}/metadata-bundle" \
          --metadata-repository "${{ needs.prepare.outputs.signature_repository }}" \
          --image-digest "${{ needs.resolve-candidate-artifact.outputs.candidate_digest }}"

  verify-candidate-artifact:
    needs: [prepare, resolve-candidate-artifact, ensure-candidate-metadata-bundle]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up crane
      uses: ./.github/actions/setup-crane
      with:
        install-dir: ${{ runner.temp }}/bin

    - name: Set up ORAS
      uses: ./.github/actions/setup-oras
      with:
        install-dir: ${{ runner.temp }}/bin

    - name: Log in to GHCR with crane
      shell: bash
      run: crane auth login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"

    - name: Log in to GHCR with ORAS
      shell: bash
      run: oras login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"

    - name: Verify candidate artifact metadata
      shell: bash
      run: |
        bash .github/scripts/verify_candidate_image.sh \
          --image-ref "${{ needs.prepare.outputs.image_name }}@${{ needs.resolve-candidate-artifact.outputs.candidate_digest }}" \
          --expected-description "${{ needs.prepare.outputs.image_description }}" \
          --expected-revision "${{ needs.prepare.outputs.full_sha }}" \
          --expected-version "${{ needs.prepare.outputs.version }}" \
          --expected-source "${{ needs.prepare.outputs.source_url }}" \
          --expected-title "${{ env.IMAGE_TITLE }}"

    - name: Verify candidate metadata bundle
      shell: bash
      run: |
        bash .github/scripts/verify_candidate_metadata_bundle.sh \
          --image-ref "${{ needs.prepare.outputs.image_name }}@${{ needs.resolve-candidate-artifact.outputs.candidate_digest }}" \
          --metadata-repository "${{ needs.prepare.outputs.signature_repository }}" \
          --expected-version "${{ needs.prepare.outputs.version }}" \
          --expected-revision "${{ needs.prepare.outputs.full_sha }}" \
          --expected-source "${{ needs.prepare.outputs.source_url }}"

  publish-release-tags:
    needs: [prepare, resolve-candidate-artifact, verify-candidate-artifact]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up crane
      uses: ./.github/actions/setup-crane
      with:
        install-dir: ${{ runner.temp }}/bin

    - name: Log in to GHCR with crane
      shell: bash
      run: crane auth login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"

    - name: Attach immutable release tags
      shell: bash
      run: |
        tags=("${{ needs.prepare.outputs.version }}")
        if [[ "${{ needs.prepare.outputs.release_type }}" == "stable" ]]; then
          tags+=("${{ needs.prepare.outputs.major_minor }}")
        else
          tags+=("${{ needs.prepare.outputs.prerelease_series }}")
        fi

        args=()
        for tag in "${tags[@]}"; do
          args+=(--tag "$tag")
        done

        bash .github/scripts/promote_container_image.sh \
          --image-name "${{ needs.prepare.outputs.image_name }}" \
          --source-digest "${{ needs.resolve-candidate-artifact.outputs.candidate_digest }}" \
          "${args[@]}"

  promote-channel-tags:
    needs: [prepare, resolve-candidate-artifact, publish-release-tags]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up crane
      uses: ./.github/actions/setup-crane
      with:
        install-dir: ${{ runner.temp }}/bin

    - name: Log in to GHCR with crane
      shell: bash
      run: crane auth login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"

    - name: Promote channel tag
      shell: bash
      run: |
        bash .github/scripts/promote_container_image.sh \
          --image-name "${{ needs.prepare.outputs.image_name }}" \
          --source-digest "${{ needs.resolve-candidate-artifact.outputs.candidate_digest }}" \
          --tag "${{ needs.prepare.outputs.release_type }}"

  upload-metadata-release-assets:
    needs: [prepare, resolve-candidate-artifact, ensure-candidate-metadata-bundle, publish-release-tags]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up ORAS
      uses: ./.github/actions/setup-oras
      with:
        install-dir: ${{ runner.temp }}/bin

    - name: Log in to GHCR with ORAS
      shell: bash
      run: oras login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"

    - name: Pull metadata bundle
      shell: bash
      run: |
        metadata_tag="$(bash .github/scripts/metadata_bundle_tag.sh --image-digest "${{ needs.resolve-candidate-artifact.outputs.candidate_digest }}")"
        oras pull "${{ needs.prepare.outputs.signature_repository }}:${metadata_tag}" --output "${{ runner.temp }}/metadata-bundle"

    - name: Upload bundle files to GitHub release assets
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      shell: bash
      run: |
        gh release upload "${{ inputs.release_tag }}" --clobber \
          "${{ runner.temp }}/metadata-bundle/metadata.json" \
          "${{ runner.temp }}/metadata-bundle/provenance/intoto.jsonl" \
          "${{ runner.temp }}/metadata-bundle/sbom/linux-amd64.spdx.json" \
          "${{ runner.temp }}/metadata-bundle/sbom/linux-arm64.spdx.json"

  sign-and-attest:
    needs: [prepare, resolve-candidate-artifact, promote-channel-tags]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
    - name: Install Cosign
      uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

    - name: Log in to GHCR
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Sign promoted digest
      shell: bash
      env:
        COSIGN_REPOSITORY: ${{ needs.prepare.outputs.signature_repository }}
      run: cosign sign --yes "${{ needs.prepare.outputs.image_name }}@${{ needs.resolve-candidate-artifact.outputs.candidate_digest }}"

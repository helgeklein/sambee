name: Build Companion

on:
  push:
    tags:
      - 'companion-v*'
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Platforms to build'
        type: choice
        options:
          - all
          - linux-x64
          - macos-arm64
          - windows-x64
          - windows-arm64
        default: 'all'

# Cancel any in-progress builds for the same ref
concurrency:
  group: build-companion-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Compute build matrix (filter by selected platform for manual runs)
  # ─────────────────────────────────────────────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          ALL='[
            {"platform":"ubuntu-latest","target":"x86_64-unknown-linux-gnu","label":"linux-x64"},
            {"platform":"macos-latest","target":"aarch64-apple-darwin","label":"macos-arm64"},
            {"platform":"windows-latest","target":"x86_64-pc-windows-msvc","label":"windows-x64"},
            {"platform":"windows-latest","target":"aarch64-pc-windows-msvc","label":"windows-arm64"}
          ]'
          SELECTED="${{ github.event.inputs.platforms }}"
          if [[ -z "$SELECTED" || "$SELECTED" == "all" ]]; then
            echo "matrix={\"include\":$ALL}" >> "$GITHUB_OUTPUT"
          else
            FILTERED=$(echo "$ALL" | jq -c "[.[] | select(.label == \"$SELECTED\")]")
            echo "matrix={\"include\":$FILTERED}" >> "$GITHUB_OUTPUT"
          fi

  # ─────────────────────────────────────────────────────────────────────
  # Cross-platform build matrix (Windows, macOS, Linux)
  # ─────────────────────────────────────────────────────────────────────
  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── System dependencies (Linux only) ──
      - name: Install Tauri system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      # ── Rust toolchain ──
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: companion/src-tauri -> target

      # ── Node.js + frontend build ──
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node_modules
        uses: actions/cache@v4
        id: node-cache
        with:
          path: companion/node_modules
          key: ${{ runner.os }}-node-20-companion-${{ hashFiles('companion/package-lock.json') }}

      - name: Install Node.js dependencies
        if: steps.node-cache.outputs.cache-hit != 'true'
        run: cd companion && npm ci

      # ── Build with tauri-action ──
      - name: Build Tauri application
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code signing for macOS
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Tauri updater signing
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: companion
          args: --target ${{ matrix.target }}
          tagName: companion-v__VERSION__
          releaseName: 'Sambee Companion v__VERSION__'
          releaseBody: 'See the assets below to download and install.'
          releaseDraft: true
          prerelease: false

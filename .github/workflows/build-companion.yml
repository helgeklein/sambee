name: "Release: Build Companion Artifact"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  COMPANION_RELEASE_REPO_OWNER: helgeklein
  COMPANION_RELEASE_REPO_NAME: sambee-companion
  COMPANION_RELEASE_REPO_BRANCH: main

on:
  workflow_dispatch:
    inputs:
      build_all_platforms:
        description: 'Build all supported platforms'
        type: boolean
        default: false
      build_linux_x64:
        description: 'Build Linux x64'
        type: boolean
        default: false
      build_macos_arm64:
        description: 'Build macOS ARM64'
        type: boolean
        default: false
      build_windows_x64:
        description: 'Build Windows x64'
        type: boolean
        default: false
      build_windows_arm64:
        description: 'Build Windows ARM64'
        type: boolean
        default: false

# Cancel any in-progress builds for the same ref
concurrency:
  group: build-companion-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Compute build matrix from manual platform toggles.
  # If no boxes are checked, skip the build matrix entirely.
  # ─────────────────────────────────────────────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          ALL='[{"platform":"ubuntu-latest","target":"x86_64-unknown-linux-gnu","label":"linux-x64","bundles":"deb,appimage"},{"platform":"macos-latest","target":"aarch64-apple-darwin","label":"macos-arm64","bundles":"dmg"},{"platform":"windows-latest","target":"x86_64-pc-windows-msvc","label":"windows-x64","bundles":"nsis"},{"platform":"windows-latest","target":"aarch64-pc-windows-msvc","label":"windows-arm64","bundles":"nsis"}]'
          SELECTED_LABELS=()

          if [[ "${{ inputs.build_all_platforms }}" == 'true' ]]; then
            echo 'Selected platforms: all supported platforms' >> "$GITHUB_STEP_SUMMARY"
            echo "matrix={\"include\":$ALL}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ inputs.build_linux_x64 }}" == 'true' ]]; then
            SELECTED_LABELS+=("linux-x64")
          fi
          if [[ "${{ inputs.build_macos_arm64 }}" == 'true' ]]; then
            SELECTED_LABELS+=("macos-arm64")
          fi
          if [[ "${{ inputs.build_windows_x64 }}" == 'true' ]]; then
            SELECTED_LABELS+=("windows-x64")
          fi
          if [[ "${{ inputs.build_windows_arm64 }}" == 'true' ]]; then
            SELECTED_LABELS+=("windows-arm64")
          fi

          if [[ ${#SELECTED_LABELS[@]} -eq 0 ]]; then
            echo 'No platforms were selected. Skipping companion artifact builds.' >> "$GITHUB_STEP_SUMMARY"
            echo '::notice::No platforms were selected. Skipping companion artifact builds.'
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
          else
            printf 'Selected platforms: %s\n' "$(IFS=', '; echo "${SELECTED_LABELS[*]}")" >> "$GITHUB_STEP_SUMMARY"
            FILTERED=$(echo "$ALL" | jq -c --argjson selected "$(printf '%s\n' "${SELECTED_LABELS[@]}" | jq -R . | jq -s .)" '[.[] | select(.label as $label | $selected | index($label))]')
            echo "matrix={\"include\":$FILTERED}" >> "$GITHUB_OUTPUT"
          fi

  # ─────────────────────────────────────────────────────────────────────
  # Cross-platform build matrix (Windows, macOS, Linux)
  # ─────────────────────────────────────────────────────────────────────
  build:
    needs: prepare
    if: ${{ fromJson(needs.prepare.outputs.matrix).include[0] != null }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Sync and verify version metadata
        uses: ./.github/actions/sync-version-check

      # ── System dependencies (Linux only) ──
      - name: Install Tauri system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      # ── Git auth for CI (prevents "terminal prompts disabled" errors) ──
      - name: Configure git auth for CI
        run: git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      # ── Rust toolchain ──
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@c106961feec855ef5a58494c5a2a31c9d80429a9
        with:
          workspaces: companion/src-tauri -> target
          # This workflow delegates release bundling to tauri-action. On Windows,
          # that path is not reliably present when rust-cache runs its post-job
          # save step, which causes a noisy non-fatal cache path validation error.
          # Keep caching the cargo registry/tooling, but skip target-dir saves here.
          cache-targets: false

      # ── Node.js + frontend build ──
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Cache node_modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        id: node-cache
        with:
          path: companion/node_modules
          key: ${{ runner.os }}-node-20-companion-${{ hashFiles('companion/package-lock.json') }}

      - name: Install Node.js dependencies
        if: steps.node-cache.outputs.cache-hit != 'true'
        run: cd companion && npm ci

      - name: Verify Tauri package version alignment
        shell: bash
        run: |
          if command -v python3 >/dev/null 2>&1; then
            python3 scripts/check_tauri_version_alignment.py
          elif command -v python >/dev/null 2>&1; then
            python scripts/check_tauri_version_alignment.py
          else
            py scripts/check_tauri_version_alignment.py
          fi

      # ── Code signing tools (Windows only) ──
      - name: Install trusted-signing-cli
        if: runner.os == 'Windows'
        run: cargo install trusted-signing-cli --version 0.9.0 --locked

      - name: Pre-install Azure Code Signing dlib
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $cacheDir = "$env:USERPROFILE\.trusted-signing-cli"
          $libDir = "$cacheDir\lib"
          $nupkgPath = "$cacheDir\signing-client.nupkg"
          $url = "https://www.nuget.org/api/v2/package/Microsoft.Trusted.Signing.Client/1.0.95"

          New-Item -ItemType Directory -Path $libDir -Force | Out-Null

          # Download the NuGet package with retry and validation
          $maxRetries = 3
          for ($i = 1; $i -le $maxRetries; $i++) {
            try {
              Write-Host "Downloading Azure Code Signing dlib (attempt $i/$maxRetries)..."
              Invoke-WebRequest -Uri $url -OutFile $nupkgPath -UseBasicParsing
              # Validate that the download is a valid ZIP archive
              Add-Type -AssemblyName System.IO.Compression.FileSystem
              [System.IO.Compression.ZipFile]::OpenRead($nupkgPath).Dispose()
              Write-Host "Download validated successfully."
              break
            } catch {
              Remove-Item -Path $nupkgPath -ErrorAction SilentlyContinue
              if ($i -eq $maxRetries) {
                throw "Failed to download Azure Code Signing dlib after $maxRetries attempts: $_"
              }
              Write-Host "Attempt $i failed: $_. Retrying in 10s..."
              Start-Sleep -Seconds 10
            }
          }

          Expand-Archive -Path $nupkgPath -DestinationPath $libDir -Force
          Remove-Item -Path $nupkgPath

          if (Test-Path "$libDir\bin\x64\Azure.CodeSigning.Dlib.dll") {
            Write-Host "Azure Code Signing dlib installed successfully."
          } else {
            throw "Azure Code Signing dlib not found after extraction."
          }

      # ── Build with tauri-action ──
      - name: Build Tauri application
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0.6.2
        id: tauri-build
        env:
          GITHUB_TOKEN: ${{ secrets.COMPANION_RELEASE_REPO_TOKEN }}
          # Force sparse protocol for crates.io index (avoids git auth issues)
          CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
          # Code signing for macOS
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Code signing for Windows (Azure Trusted Signing)
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_TRUSTED_SIGNING_ACCOUNT_NAME: HK-Artifact-Signing
          AZURE_CERTIFICATE_PROFILE_NAME: HK-Certificate-Profile
          # Tauri updater signing
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: companion
          # -v enables verbose bundler logging for easier CI debugging.
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }} -v
          owner: ${{ env.COMPANION_RELEASE_REPO_OWNER }}
          repo: ${{ env.COMPANION_RELEASE_REPO_NAME }}
          releaseCommitish: ${{ env.COMPANION_RELEASE_REPO_BRANCH }}
          includeUpdaterJson: false
          tagName: companion-v__VERSION__
          releaseName: 'Sambee Companion v__VERSION__'
          releaseBody: 'See the assets below to download and install.'
          releaseDraft: true
          prerelease: false

      # ── Upload build artifacts ──
      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: companion-${{ matrix.label }}
          path: companion/src-tauri/target/${{ matrix.target }}/release/bundle/
          retention-days: 14


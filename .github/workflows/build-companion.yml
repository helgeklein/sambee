name: "Release: Build Companion Artifact"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  COMPANION_RELEASE_REPO_OWNER: helgeklein
  COMPANION_RELEASE_REPO_NAME: sambee-companion
  COMPANION_RELEASE_REPO_BRANCH: main

on:
  workflow_dispatch:
    inputs:
      build_version:
        description: Existing immutable build version to publish. Leave empty to reserve the VERSION at this main commit.
        required: false
        type: string
      build_all_platforms:
        description: 'Build all supported platforms'
        type: boolean
        default: false
      build_linux_x64:
        description: 'Build Linux x64'
        type: boolean
        default: false
      build_macos_arm64:
        description: 'Build macOS ARM64'
        type: boolean
        default: false
      build_windows_x64:
        description: 'Build Windows x64'
        type: boolean
        default: false
      build_windows_arm64:
        description: 'Build Windows ARM64'
        type: boolean
        default: false

concurrency:
  group: companion-release-publication
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Compute build matrix from manual platform toggles.
  # If no boxes are checked, skip the build matrix entirely.
  # ─────────────────────────────────────────────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      checkout_ref: ${{ steps.preflight.outputs.source_sha }}
      build_tag: ${{ steps.preflight.outputs.build_tag }}
      version: ${{ steps.metadata.outputs.version }}
      release_tag: ${{ steps.metadata.outputs.release_tag }}
      publication_state: ${{ steps.release-state.outputs.state }}
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Reserve or resolve canonical build source
        id: preflight
        uses: ./.github/actions/release-candidate-preflight
        with:
          build-version: ${{ inputs.build_version }}
          dispatch-ref: ${{ github.ref }}
          dispatch-sha: ${{ github.sha }}
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Resolve release metadata
        id: metadata
        shell: bash
        run: |
          release_tag="companion-v${{ steps.preflight.outputs.version }}"

          echo "version=${{ steps.preflight.outputs.version }}" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"

      - name: Resolve Companion publication state
        id: release-state
        env:
          GITHUB_TOKEN: ${{ secrets.COMPANION_RELEASE_REPO_TOKEN }}
        run: |
          python3 .github/scripts/resolve_companion_release_state.py \
            --owner "${{ env.COMPANION_RELEASE_REPO_OWNER }}" \
            --repo "${{ env.COMPANION_RELEASE_REPO_NAME }}" \
            --version "${{ steps.preflight.outputs.version }}" \
            --build-tag "${{ steps.preflight.outputs.build_tag }}" \
            --source-sha "${{ steps.preflight.outputs.source_sha }}" \
            --release-tag "${{ steps.metadata.outputs.release_tag }}" >> "$GITHUB_OUTPUT"

      - name: Summarize publication state
        run: |
          {
            echo '## Companion publication'
            echo
            echo "- Concurrency group: \`companion-release-publication\`"
            echo "- State: \`${{ steps.release-state.outputs.state }}\`"
            echo "- Canonical build: \`${{ steps.preflight.outputs.build_tag }}\`"
            echo "- Source SHA: \`${{ steps.preflight.outputs.source_sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - id: set-matrix
        run: |
          ALL='[{"platform":"ubuntu-latest","target":"x86_64-unknown-linux-gnu","label":"linux-x64","bundles":"deb,appimage"},{"platform":"macos-latest","target":"aarch64-apple-darwin","label":"macos-arm64","bundles":"dmg"},{"platform":"windows-latest","target":"x86_64-pc-windows-msvc","label":"windows-x64","bundles":"nsis"},{"platform":"windows-latest","target":"aarch64-pc-windows-msvc","label":"windows-arm64","bundles":"nsis"}]'
          SELECTED_LABELS=()

          if [[ "${{ inputs.build_all_platforms }}" == 'true' ]]; then
            echo 'Selected platforms: all supported platforms' >> "$GITHUB_STEP_SUMMARY"
            echo "matrix={\"include\":$ALL}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ inputs.build_linux_x64 }}" == 'true' ]]; then
            SELECTED_LABELS+=("linux-x64")
          fi
          if [[ "${{ inputs.build_macos_arm64 }}" == 'true' ]]; then
            SELECTED_LABELS+=("macos-arm64")
          fi
          if [[ "${{ inputs.build_windows_x64 }}" == 'true' ]]; then
            SELECTED_LABELS+=("windows-x64")
          fi
          if [[ "${{ inputs.build_windows_arm64 }}" == 'true' ]]; then
            SELECTED_LABELS+=("windows-arm64")
          fi

          if [[ ${#SELECTED_LABELS[@]} -eq 0 ]]; then
            echo 'No platforms were selected. Skipping companion artifact builds.' >> "$GITHUB_STEP_SUMMARY"
            echo '::notice::No platforms were selected. Skipping companion artifact builds.'
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
          else
            printf 'Selected platforms: %s\n' "$(IFS=', '; echo "${SELECTED_LABELS[*]}")" >> "$GITHUB_STEP_SUMMARY"
            FILTERED=$(echo "$ALL" | jq -c --argjson selected "$(printf '%s\n' "${SELECTED_LABELS[@]}" | jq -R . | jq -s .)" '[.[] | select(.label as $label | $selected | index($label))]')
            echo "matrix={\"include\":$FILTERED}" >> "$GITHUB_OUTPUT"
          fi

  # ─────────────────────────────────────────────────────────────────────
  # Cross-platform build matrix (Windows, macOS, Linux)
  # ─────────────────────────────────────────────────────────────────────
  build:
    needs: prepare
    if: ${{ needs.prepare.outputs.publication_state == 'build' && fromJson(needs.prepare.outputs.matrix).include[0] != null }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Sync and verify version metadata
        uses: ./.github/actions/sync-version-check

      # ── System dependencies (Linux only) ──
      - name: Install Tauri system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      # ── Git auth for CI (prevents "terminal prompts disabled" errors) ──
      - name: Configure git auth for CI
        run: git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      # ── Rust toolchain ──
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      # ── Node.js + frontend build ──
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Cache node_modules
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        id: node-cache
        with:
          path: companion/node_modules
          key: ${{ runner.os }}-node-20-companion-${{ hashFiles('companion/package-lock.json') }}

      - name: Install Node.js dependencies
        if: steps.node-cache.outputs.cache-hit != 'true'
        run: cd companion && npm ci

      - name: Verify Tauri package version alignment
        shell: bash
        run: |
          if command -v python3 >/dev/null 2>&1; then
            python3 scripts/check_tauri_version_alignment.py
          elif command -v python >/dev/null 2>&1; then
            python scripts/check_tauri_version_alignment.py
          else
            py scripts/check_tauri_version_alignment.py
          fi

      # ── Code signing tools (Windows only) ──
      - name: Install trusted-signing-cli
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
          CARGO_HTTP_MULTIPLEXING: "false"
          CARGO_NET_RETRY: "5"
        run: |
          $maxRetries = 3
          for ($i = 1; $i -le $maxRetries; $i++) {
            try {
              Write-Host "Installing trusted-signing-cli (attempt $i/$maxRetries)..."
              cargo install trusted-signing-cli --version 0.9.0 --locked
              Write-Host "trusted-signing-cli installed successfully."
              break
            } catch {
              if ($LASTEXITCODE -eq 0) {
                throw
              }

              if ($i -eq $maxRetries) {
                throw "Failed to install trusted-signing-cli after $maxRetries attempts: $_"
              }

              Write-Host "Attempt $i failed: $_"
              Write-Host "Retrying in 10 seconds..."
              Start-Sleep -Seconds 10
            }
          }

      - name: Pre-install Azure Code Signing dlib
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $cacheDir = "$env:USERPROFILE\.trusted-signing-cli"
          $libDir = "$cacheDir\lib"
          $nupkgPath = "$cacheDir\signing-client.nupkg"
          $url = "https://www.nuget.org/api/v2/package/Microsoft.Trusted.Signing.Client/1.0.95"

          New-Item -ItemType Directory -Path $libDir -Force | Out-Null

          # Download the NuGet package with retry and validation
          $maxRetries = 3
          for ($i = 1; $i -le $maxRetries; $i++) {
            try {
              Write-Host "Downloading Azure Code Signing dlib (attempt $i/$maxRetries)..."
              Invoke-WebRequest -Uri $url -OutFile $nupkgPath -UseBasicParsing
              # Validate that the download is a valid ZIP archive
              Add-Type -AssemblyName System.IO.Compression.FileSystem
              [System.IO.Compression.ZipFile]::OpenRead($nupkgPath).Dispose()
              Write-Host "Download validated successfully."
              break
            } catch {
              Remove-Item -Path $nupkgPath -ErrorAction SilentlyContinue
              if ($i -eq $maxRetries) {
                throw "Failed to download Azure Code Signing dlib after $maxRetries attempts: $_"
              }
              Write-Host "Attempt $i failed: $_. Retrying in 10s..."
              Start-Sleep -Seconds 10
            }
          }

          Expand-Archive -Path $nupkgPath -DestinationPath $libDir -Force
          Remove-Item -Path $nupkgPath

          if (Test-Path "$libDir\bin\x64\Azure.CodeSigning.Dlib.dll") {
            Write-Host "Azure Code Signing dlib installed successfully."
          } else {
            throw "Azure Code Signing dlib not found after extraction."
          }

      # ── Package locally; only the finalizer may create an external release. ──
      - name: Build Tauri application
        shell: bash
        env:
          CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_TRUSTED_SIGNING_ACCOUNT_NAME: HK-Artifact-Signing
          AZURE_CERTIFICATE_PROFILE_NAME: HK-Certificate-Profile
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: cd companion && npm run tauri -- build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }} -v

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: companion-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.label }}-${{ matrix.target }}
          path: companion/src-tauri/target/${{ matrix.target }}/release/bundle/
          if-no-files-found: error
          retention-days: 14

  finalize-release:
    needs: [prepare, build]
    if: ${{ always() && needs.prepare.outputs.publication_state != 'complete' && (needs.prepare.outputs.publication_state == 'recover-finalizer' || needs.build.result == 'success') }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Download authoritative Companion artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMPANION_TOKEN: ${{ secrets.COMPANION_RELEASE_REPO_TOKEN }}
          PUBLICATION_STATE: ${{ needs.prepare.outputs.publication_state }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          RELEASE_REPOSITORY: ${{ env.COMPANION_RELEASE_REPO_OWNER }}/${{ env.COMPANION_RELEASE_REPO_NAME }}
        run: |
          mkdir -p "$RUNNER_TEMP/companion-artifacts"
          if [[ "$PUBLICATION_STATE" == "build" ]]; then
            gh run download "$GITHUB_RUN_ID" \
              --pattern "companion-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-*" \
              --dir "$RUNNER_TEMP/companion-artifacts"
            exit 0
          fi

          GH_TOKEN="$COMPANION_TOKEN" gh release download "$RELEASE_TAG" \
            --repo "$RELEASE_REPOSITORY" \
            --pattern companion-release-provenance.json \
            --dir "$RUNNER_TEMP/companion-artifacts"
          mapfile -t artifact_records < <(jq -c '.actions_artifacts[]' "$RUNNER_TEMP/companion-artifacts/companion-release-provenance.json")
          for record in "${artifact_records[@]}"; do
            artifact_id="$(jq -r '.id' <<<"$record")"
            expected_name="$(jq -r '.name' <<<"$record")"
            expected_digest="$(jq -r '.digest' <<<"$record")"
            artifact_json="$(gh api "repos/$GITHUB_REPOSITORY/actions/artifacts/$artifact_id")"
            if [[ "$(jq -r '.name' <<<"$artifact_json")" != "$expected_name" || \
                  "$(jq -r '.expired' <<<"$artifact_json")" != "false" || \
                  "$(jq -r '.digest // empty' <<<"$artifact_json")" != "$expected_digest" ]]; then
              echo "Retained artifact $artifact_id no longer matches the provenance record; increment Z and rebuild." >&2
              exit 1
            fi
            archive="$RUNNER_TEMP/companion-artifact-$artifact_id.zip"
            gh api "repos/$GITHUB_REPOSITORY/actions/artifacts/$artifact_id/zip" > "$archive"
            unzip -q "$archive" -d "$RUNNER_TEMP/companion-artifacts"
          done

      - name: Create release provenance and completion marker
        shell: bash
        env:
          ARTIFACT_DIR: ${{ runner.temp }}/companion-artifacts
          BUILD_TAG: ${{ needs.prepare.outputs.build_tag }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          SOURCE_SHA: ${{ needs.prepare.outputs.checkout_ref }}
          VERSION: ${{ needs.prepare.outputs.version }}
          PUBLICATION_STATE: ${{ needs.prepare.outputs.publication_state }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          artifact_dir = Path(os.environ["ARTIFACT_DIR"])
          provenance_path = artifact_dir / "companion-release-provenance.json"
          completion_path = artifact_dir / "companion-completion-marker.json"
          if os.environ["PUBLICATION_STATE"] == "recover-finalizer":
              provenance_bytes = provenance_path.read_bytes()
              provenance = json.loads(provenance_bytes)
              expected_assets_json = json.dumps(
                sorted(provenance["assets"], key=lambda asset: asset["name"]),
                separators=(",", ":"),
                sort_keys=True,
              ).encode("utf-8")
              completion = {
                  "schema_version": 1,
                  "provenance_sha256": hashlib.sha256(provenance_bytes).hexdigest(),
                  "expected_assets": provenance["assets"],
                "expected_assets_sha256": hashlib.sha256(expected_assets_json).hexdigest(),
              }
              completion_path.write_text(
                  json.dumps(completion, indent=2, sort_keys=True) + "\n", encoding="utf-8"
              )
              raise SystemExit(0)
          assets = []
          for path in sorted(path for path in artifact_dir.rglob("*") if path.is_file()):
              if path.name in {"companion-release-provenance.json", "companion-completion-marker.json"}:
                  continue
              assets.append({
                  "name": path.name,
                  "sha256": hashlib.file_digest(path.open("rb"), "sha256").hexdigest(),
                  "size": path.stat().st_size,
              })
          if not assets:
              raise SystemExit("No Companion package assets were downloaded.")
          provenance = {
              "schema_version": 1,
              "build_tag": os.environ["BUILD_TAG"],
              "release_tag": os.environ["RELEASE_TAG"],
              "source_sha": os.environ["SOURCE_SHA"],
              "version": os.environ["VERSION"],
              "assets": assets,
              "workflow_run": {
                  "id": int(os.environ["GITHUB_RUN_ID"]),
                  "attempt": int(os.environ["GITHUB_RUN_ATTEMPT"]),
                  "url": f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}",
              },
              "actions_artifacts": [],
          }
          import subprocess
          artifacts = json.loads(subprocess.check_output(
              ["gh", "api", f"repos/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}/artifacts?per_page=100"],
              text=True,
          ))["artifacts"]
          prefix = f"companion-{os.environ['GITHUB_RUN_ID']}-{os.environ['GITHUB_RUN_ATTEMPT']}-"
          provenance["actions_artifacts"] = [
              {"id": artifact["id"], "name": artifact["name"], "digest": artifact.get("digest", "")}
              for artifact in artifacts
              if artifact.get("name", "").startswith(prefix)
          ]
          if not provenance["actions_artifacts"] or any(not artifact["digest"] for artifact in provenance["actions_artifacts"]):
              raise SystemExit("Unable to record immutable GitHub Actions artifact identities for finalizer recovery.")
          provenance_path.write_text(json.dumps(provenance, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          completion = {
              "schema_version": 1,
              "provenance_sha256": hashlib.file_digest(provenance_path.open("rb"), "sha256").hexdigest(),
              "expected_assets": assets,
              "expected_assets_sha256": hashlib.sha256(json.dumps(
                sorted(assets, key=lambda asset: asset["name"]),
                separators=(",", ":"),
                sort_keys=True,
              ).encode("utf-8")).hexdigest(),
          }
          completion_path.write_text(
              json.dumps(completion, indent=2, sort_keys=True) + "\n", encoding="utf-8"
          )
          PY

      - name: Create or resume external draft release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.COMPANION_RELEASE_REPO_TOKEN }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          RELEASE_REPOSITORY: ${{ env.COMPANION_RELEASE_REPO_OWNER }}/${{ env.COMPANION_RELEASE_REPO_NAME }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          release_json="$(gh release view "$RELEASE_TAG" --repo "$RELEASE_REPOSITORY" --json isDraft 2>/dev/null || true)"
          if [[ -z "$release_json" ]]; then
            gh release create "$RELEASE_TAG" \
              --repo "$RELEASE_REPOSITORY" \
              --draft \
              --target "${{ env.COMPANION_RELEASE_REPO_BRANCH }}" \
              --title "Sambee Companion v$VERSION" \
              --notes "See the assets below to download and install."
          elif [[ "$(jq -r '.isDraft' <<<"$release_json")" != "true" ]]; then
            echo "External release $RELEASE_TAG is already published and cannot be modified by a build finalizer." >&2
            exit 1
          fi

      - name: Upload verified release assets
        shell: bash
        env:
          ARTIFACT_DIR: ${{ runner.temp }}/companion-artifacts
          GH_TOKEN: ${{ secrets.COMPANION_RELEASE_REPO_TOKEN }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          RELEASE_REPOSITORY: ${{ env.COMPANION_RELEASE_REPO_OWNER }}/${{ env.COMPANION_RELEASE_REPO_NAME }}
        run: |
          upload_or_verify() {
            local asset_path="$1"
            local asset_name
            asset_name="$(basename "$asset_path")"
            local remote_asset
            remote_asset="$(gh release view "$RELEASE_TAG" --repo "$RELEASE_REPOSITORY" --json assets --jq ".assets[] | select(.name == \"$asset_name\") | .name" || true)"
            if [[ -z "$remote_asset" ]]; then
              gh release upload "$RELEASE_TAG" "$asset_path" --repo "$RELEASE_REPOSITORY"
              return
            fi
            local existing_dir="$RUNNER_TEMP/existing-release-assets"
            mkdir -p "$existing_dir"
            rm -f "$existing_dir/$asset_name"
            gh release download "$RELEASE_TAG" --repo "$RELEASE_REPOSITORY" --pattern "$asset_name" --dir "$existing_dir"
            if ! cmp --silent "$asset_path" "$existing_dir/$asset_name"; then
              echo "Existing release asset $asset_name differs from the retained build artifact; increment Z and rebuild." >&2
              exit 1
            fi
          }

          upload_or_verify "$ARTIFACT_DIR/companion-release-provenance.json"
          while IFS= read -r -d '' asset; do
            case "$(basename "$asset")" in
              companion-release-provenance.json|companion-completion-marker.json) continue ;;
            esac
            upload_or_verify "$asset"
          done < <(find "$ARTIFACT_DIR" -type f -print0 | sort -z)
          upload_or_verify "$ARTIFACT_DIR/companion-completion-marker.json"


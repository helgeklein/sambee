name: Build Companion

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'companion-v*'
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Platforms to build'
        type: choice
        options:
          - all
          - linux-x64
          - macos-arm64
          - windows-x64
          - windows-arm64
        default: 'all'

# Cancel any in-progress builds for the same ref
concurrency:
  group: build-companion-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Compute build matrix (filter by selected platform for manual runs)
  # ─────────────────────────────────────────────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          ALL='[
            {"platform":"ubuntu-latest","target":"x86_64-unknown-linux-gnu","label":"linux-x64","bundles":"deb,appimage"},
            {"platform":"macos-latest","target":"aarch64-apple-darwin","label":"macos-arm64","bundles":"dmg"},
            {"platform":"windows-latest","target":"x86_64-pc-windows-msvc","label":"windows-x64","bundles":"nsis"},
            {"platform":"windows-latest","target":"aarch64-pc-windows-msvc","label":"windows-arm64","bundles":"nsis"}
          ]'
          SELECTED="${{ github.event.inputs.platforms }}"
          if [[ -z "$SELECTED" || "$SELECTED" == "all" ]]; then
            echo "matrix={\"include\":$ALL}" >> "$GITHUB_OUTPUT"
          else
            FILTERED=$(echo "$ALL" | jq -c "[.[] | select(.label == \"$SELECTED\")]")
            echo "matrix={\"include\":$FILTERED}" >> "$GITHUB_OUTPUT"
          fi

  # ─────────────────────────────────────────────────────────────────────
  # Cross-platform build matrix (Windows, macOS, Linux)
  # ─────────────────────────────────────────────────────────────────────
  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # ── System dependencies (Linux only) ──
      - name: Install Tauri system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      # ── Git auth for CI (prevents "terminal prompts disabled" errors) ──
      - name: Configure git auth for CI
        run: git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      # ── Rust toolchain ──
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@8a02ed5e290d8afc7e587930243f3016b3223f50
        with:
          workspaces: companion/src-tauri -> target

      # ── Node.js + frontend build ──
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Cache node_modules
        uses: actions/cache@v5
        id: node-cache
        with:
          path: companion/node_modules
          key: ${{ runner.os }}-node-20-companion-${{ hashFiles('companion/package-lock.json') }}

      - name: Install Node.js dependencies
        if: steps.node-cache.outputs.cache-hit != 'true'
        run: cd companion && npm ci

      # ── Code signing tools (Windows only) ──
      - name: Install trusted-signing-cli
        if: runner.os == 'Windows'
        run: cargo install trusted-signing-cli

      - name: Pre-install Azure Code Signing dlib
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $cacheDir = "$env:USERPROFILE\.trusted-signing-cli"
          $libDir = "$cacheDir\lib"
          $nupkgPath = "$cacheDir\signing-client.nupkg"
          $url = "https://www.nuget.org/api/v2/package/Microsoft.Trusted.Signing.Client/1.0.95"

          New-Item -ItemType Directory -Path $libDir -Force | Out-Null

          # Download the NuGet package with retry and validation
          $maxRetries = 3
          for ($i = 1; $i -le $maxRetries; $i++) {
            try {
              Write-Host "Downloading Azure Code Signing dlib (attempt $i/$maxRetries)..."
              Invoke-WebRequest -Uri $url -OutFile $nupkgPath -UseBasicParsing
              # Validate that the download is a valid ZIP archive
              Add-Type -AssemblyName System.IO.Compression.FileSystem
              [System.IO.Compression.ZipFile]::OpenRead($nupkgPath).Dispose()
              Write-Host "Download validated successfully."
              break
            } catch {
              Remove-Item -Path $nupkgPath -ErrorAction SilentlyContinue
              if ($i -eq $maxRetries) {
                throw "Failed to download Azure Code Signing dlib after $maxRetries attempts: $_"
              }
              Write-Host "Attempt $i failed: $_. Retrying in 10s..."
              Start-Sleep -Seconds 10
            }
          }

          Expand-Archive -Path $nupkgPath -DestinationPath $libDir -Force
          Remove-Item -Path $nupkgPath

          if (Test-Path "$libDir\bin\x64\Azure.CodeSigning.Dlib.dll") {
            Write-Host "Azure Code Signing dlib installed successfully."
          } else {
            throw "Azure Code Signing dlib not found after extraction."
          }

      # ── Build with tauri-action ──
      - name: Build Tauri application
        uses: tauri-apps/tauri-action@v0
        id: tauri-build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Force sparse protocol for crates.io index (avoids git auth issues)
          CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
          # Code signing for macOS
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Code signing for Windows (Azure Trusted Signing)
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_TRUSTED_SIGNING_ACCOUNT_NAME: HK-Artifact-Signing
          AZURE_CERTIFICATE_PROFILE_NAME: HK-Certificate-Profile
          # Tauri updater signing
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: companion
          # -v enables verbose bundler logging for easier CI debugging.
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }} -v
          updaterJsonPreferNsis: true
          tagName: companion-v__VERSION__
          releaseName: 'Sambee Companion v__VERSION__'
          releaseBody: 'See the assets below to download and install.'
          releaseDraft: true
          prerelease: false

      # ── Upload build artifacts ──
      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: companion-${{ matrix.label }}
          path: companion/src-tauri/target/${{ matrix.target }}/release/bundle/
          retention-days: 14


name: "Deploy: Website"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main ]
    paths:
      - '.gitattributes'
      - '.github/workflows/website-deploy.yml'
      - 'website/**'
  pull_request:
    branches: [ main ]
    paths:
      - '.gitattributes'
      - '.github/workflows/website-deploy.yml'
      - 'website/**'
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: website-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 1
        lfs: false

    - name: Cache Git LFS
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: .git/lfs
        key: website-lfs-${{ hashFiles('.gitattributes') }}-${{ github.sha }}
        restore-keys: |
          website-lfs-${{ hashFiles('.gitattributes') }}-
          website-lfs-

    - name: Pull Git LFS objects
      run: |
        git lfs version
        git lfs pull

    - name: Cache website Hugo resources
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: website/resources/_gen
        key: website-hugo-resources-${{ hashFiles('website/assets/images/**') }}
        restore-keys: |
          website-hugo-resources-

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: '1.24.4'
        cache: true
        cache-dependency-path: website/go.mod

    - name: Set up Hugo
      uses: peaceiris/actions-hugo@v3
      with:
        hugo-version: '0.160.0'
        extended: true

    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: website/package-lock.json

    - name: Install website dependencies
      run: cd website && npm ci

    - name: Validate generated WebP coverage
      run: cd website && npm run images:validate

    - name: Build website
      run: |
        cd website
        npm run build:theme
        npm run docs:validate
        npm run docs:materialize-inherited

        # Production builds use the canonical public base URL.
        if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
          base_url="https://sambee.net/"
        else
          base_url="/"
        fi

        hugo \
          --source . \
          --cleanDestinationDir \
          --gc \
          --minify \
          --templateMetrics \
          --templateMetricsHints \
          --forceSyncStatic \
          --baseURL "$base_url"

        npm run build:search-index

    - name: Upload website build artifact
      if: github.event_name != 'pull_request'
      # The deploy job runs separately, so pass website/public across as a short-lived artifact.
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: website-build
        path: website/public
        retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    # Pull requests build for validation only; only main is allowed to publish.
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    steps:
    - name: Checkout website package files
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        sparse-checkout: |
          website/package.json
          website/package-lock.json
        sparse-checkout-cone-mode: false

    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: website/package-lock.json

    - name: Install website dependencies
      run: cd website && npm ci

    - name: Download website build artifact
      uses: actions/download-artifact@v8
      with:
        name: website-build
        path: website/public

    - name: Delete website build artifact
      uses: actions/github-script@v9
      with:
        script: |
          const { owner, repo } = context.repo;
          const runId = context.runId;
          const artifacts = await github.paginate(
            github.rest.actions.listWorkflowRunArtifacts,
            { owner, repo, run_id: runId }
          );
          const target = artifacts.find((artifact) => artifact.name === 'website-build');
          if (!target) {
            core.info('No website-build artifact found to delete.');
            return;
          }
          await github.rest.actions.deleteArtifact({
            owner,
            repo,
            artifact_id: target.id,
          });
          core.info(`Deleted artifact: ${target.name}`);

    - name: Deploy to Cloudflare Pages
      # Deploy the exact built artifact that passed the build job.
      uses: cloudflare/wrangler-action@v4
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        command: pages deploy website/public --project-name=${{ secrets.CLOUDFLARE_PAGES_PROJECT }} --branch=${{ github.ref_name }}

  verify-production:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: deploy
    # Run a lightweight smoke test only after production deployments from main.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      SITE_URL: https://sambee.net
      VERIFY_PAGE: https://sambee.net/docs/website-dev-guide/site-systems/media-publishing-workflow/
    steps:
      - name: Verify deployed pages and assets
        run: |
          set -euo pipefail

          curl --retry 10 --retry-delay 10 --retry-all-errors --fail --location --output /tmp/home.html "$SITE_URL/"
          curl --retry 10 --retry-delay 10 --retry-all-errors --fail --location --output /tmp/verify-page.html "$VERIFY_PAGE"
          curl --retry 10 --retry-delay 10 --retry-all-errors --fail --location --output /tmp/docs-home.html "$SITE_URL/docs/"
          curl --retry 10 --retry-delay 10 --retry-all-errors --fail --location --output /dev/null "$SITE_URL/pagefind/pagefind.js"

          python3 - <<'PY'
          import os
          import re
          import sys
          from pathlib import Path

          site_url = os.environ["SITE_URL"]
          verify_page = os.environ["VERIFY_PAGE"]
          home_html = Path("/tmp/home.html").read_text(encoding="utf-8")

          def find_first_path(html: str, patterns: list[str]) -> str | None:
              for pattern in patterns:
                  match = re.search(pattern, html)
                  if match:
                      return match.group("path")
              return None

          image_path = find_first_path(
              home_html,
              [
                  r'content=(?:"|\')?(?P<path>/images/[^\s"\'<>]+\.webp)',
                  r'src=(?:"|\')?(?P<path>/images/[^\s"\'<>]+\.webp)',
                  r'srcset=(?:"|\')?(?P<path>/images/[^\s"\'<>]+\.webp)',
                  r'(?P<path>/images/[^\s"\'<>]+\.webp)',
              ],
          )

          if not image_path:
              print("Could not find a deployed image URL on the homepage.", file=sys.stderr)
              sys.exit(1)

          image_url = f"{site_url}{image_path}"

            # Export the discovered asset URL so the shell can verify it with curl next.
          Path("/tmp/verify-production-urls.env").write_text(
              f"IMAGE_URL={image_url}\nVERIFY_PAGE_URL={verify_page}\n",
              encoding="utf-8",
          )
          PY

          . /tmp/verify-production-urls.env
          curl --retry 10 --retry-delay 10 --retry-all-errors --fail --location --output /dev/null "$SITE_URL/"
          curl --retry 10 --retry-delay 10 --retry-all-errors --fail --location --output /dev/null "$SITE_URL/docs/"
          curl --retry 10 --retry-delay 10 --retry-all-errors --fail --location --output /dev/null "$VERIFY_PAGE_URL"
          curl --retry 10 --retry-delay 10 --retry-all-errors --fail --location --output /dev/null "$IMAGE_URL"

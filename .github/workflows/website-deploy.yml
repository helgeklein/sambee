name: Website Build and Deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main ]
    paths:
      - '.gitattributes'
      - '.github/workflows/website-deploy.yml'
      - 'website/**'
  pull_request:
    branches: [ main ]
    paths:
      - '.gitattributes'
      - '.github/workflows/website-deploy.yml'
      - 'website/**'
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy website to Cloudflare Pages'
        required: false
        type: boolean
        default: true
      sync_r2:
        description: 'Sync website media to Cloudflare R2'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  actions: write

concurrency:
  group: website-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 1
        lfs: false

    - name: Cache Git LFS
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: .git/lfs
        key: website-lfs-${{ hashFiles('.gitattributes') }}-${{ github.sha }}
        restore-keys: |
          website-lfs-${{ hashFiles('.gitattributes') }}-
          website-lfs-

    - name: Pull Git LFS objects
      run: |
        git lfs version
        git lfs pull

    - name: Cache website Hugo resources
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: website/resources/_gen
        key: website-hugo-resources-${{ hashFiles('website/assets/images/**') }}
        restore-keys: |
          website-hugo-resources-

    - name: Set up Go
      uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
      with:
        go-version: '1.24.4'
        cache: true
        cache-dependency-path: website/go.mod

    - name: Set up Hugo
      uses: peaceiris/actions-hugo@v3
      with:
        hugo-version: '0.160.0'
        extended: true

    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: website/package-lock.json

    - name: Install website dependencies
      run: cd website && npm ci

    - name: Validate generated WebP coverage
      run: cd website && npm run images:validate

    - name: Build website
      run: |
        cd website
        npm run build:theme

        if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
          base_url="https://sambee.net/"
        else
          base_url="/"
        fi

        hugo \
          --source . \
          --cleanDestinationDir \
          --gc \
          --minify \
          --templateMetrics \
          --templateMetricsHints \
          --forceSyncStatic \
          --baseURL "$base_url"

        npm run build:search-index

    - name: Upload website build artifact
      if: github.event_name != 'pull_request'
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: website-build
        path: website/public
        retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true') ||
      (github.ref == 'refs/heads/main' && github.event_name == 'push')
    steps:
    - name: Checkout website package files
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        sparse-checkout: |
          website/package.json
          website/package-lock.json
        sparse-checkout-cone-mode: false

    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: website/package-lock.json

    - name: Install website dependencies
      run: cd website && npm ci

    - name: Download website build artifact
      uses: actions/download-artifact@v5
      with:
        name: website-build
        path: website/public

    - name: Delete website build artifact
      uses: actions/github-script@v8
      with:
        script: |
          const { owner, repo } = context.repo;
          const runId = context.runId;
          const artifacts = await github.paginate(
            github.rest.actions.listWorkflowRunArtifacts,
            { owner, repo, run_id: runId }
          );
          const target = artifacts.find((artifact) => artifact.name === 'website-build');
          if (!target) {
            core.info('No website-build artifact found to delete.');
            return;
          }
          await github.rest.actions.deleteArtifact({
            owner,
            repo,
            artifact_id: target.id,
          });
          core.info(`Deleted artifact: ${target.name}`);

    - name: Sync images to Cloudflare R2 (/website/public/images/)
      if: github.ref == 'refs/heads/main' || github.event.inputs.sync_r2 == 'true'
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      run: |
        if [[ ! -d website/public/images ]]; then
          echo 'No website/public/images directory present; skipping image sync.'
          exit 0
        fi

        aws s3 sync website/public/images/ s3://${{ secrets.R2_BUCKET_NAME }}/images/ \
          --endpoint-url ${{ secrets.R2_ENDPOINT }} \
          --delete \
          --size-only \
          --cache-control "public,max-age=31536000,immutable"

    - name: Sync downloads to Cloudflare R2 (/website/public/files/)
      if: github.ref == 'refs/heads/main' || github.event.inputs.sync_r2 == 'true'
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      run: |
        if [[ ! -d website/public/files ]]; then
          echo 'No website/public/files directory present; skipping file sync.'
          exit 0
        fi

        aws s3 sync website/public/files/ s3://${{ secrets.R2_BUCKET_NAME }}/files/ \
          --endpoint-url ${{ secrets.R2_ENDPOINT }} \
          --delete \
          --cache-control "public,max-age=31536000,immutable"

    - name: Deploy to Cloudflare Pages
      uses: cloudflare/wrangler-action@v3
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        command: pages deploy website/public --project-name=${{ secrets.CLOUDFLARE_PAGES_PROJECT }} --branch=${{ github.ref_name }}

name: "Maintenance: Clean Up Docker Package Versions"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_run:
    workflows: ["Preview: Publish Test Docker Image"]
    types: [completed]
  schedule:
    - cron: '26 3 * * 0'
    - cron: '17 3 * * 2'
  workflow_dispatch:

concurrency:
  group: cleanup-docker-package-versions
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  cleanup:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up crane
      uses: ./.github/actions/setup-crane
      with:
        install-dir: ${{ runner.temp }}/bin

    - name: Log in to GHCR with crane
      shell: bash
      run: crane auth login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"

    - name: Delete unprotected and unreferenced package versions
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      shell: bash
      run: |
        owner_lower="$(printf '%s' "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"

        python3 .github/scripts/cleanup_test_container_versions.py \
          --owner "${{ github.repository_owner }}" \
          --package-name sambee

        python3 .github/scripts/cleanup_signature_container_versions.py \
          --owner "${{ github.repository_owner }}" \
          --image-package-name sambee \
          --signature-package-name sambee-signatures

        python3 .github/scripts/cleanup_untagged_container_versions.py \
          --owner "${{ github.repository_owner }}" \
          --package-name sambee \
          --image-name "ghcr.io/$owner_lower/sambee"

        python3 .github/scripts/cleanup_untagged_container_versions.py \
          --owner "${{ github.repository_owner }}" \
          --package-name sambee-signatures \
          --image-name "ghcr.io/$owner_lower/sambee-signatures"

name: "Release: Promote Companion Release"

on:
  workflow_dispatch:
    inputs:
      release_ref:
        description: Companion release tag or GitHub release URL
        required: true
        type: string
      sambee_release_tag:
        description: Public Sambee release tag that authorizes this Companion promotion
        required: true
        type: string
      companion_channel_test:
        description: Update Companion test channel feed
        required: true
        type: boolean
        default: false
      companion_channel_beta:
        description: Update Companion beta channel feed
        required: true
        type: boolean
        default: false
      companion_channel_stable:
        description: Update Companion stable channel feed
        required: true
        type: boolean
        default: false
      sambee:
        description: Update Sambee Companion feed
        required: true
        type: boolean
        default: false

env:
  COMPANION_RELEASE_REPO_OWNER: helgeklein
  COMPANION_RELEASE_REPO_NAME: sambee-companion
  COMPANION_RELEASE_REPO_BRANCH: main

permissions:
  contents: read
  packages: read

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:
      - name: Validate selection
        run: |
          if [[ "${{ github.event.inputs.companion_channel_test }}" != "true" && \
                "${{ github.event.inputs.companion_channel_beta }}" != "true" && \
                "${{ github.event.inputs.companion_channel_stable }}" != "true" && \
                "${{ github.event.inputs.sambee }}" != "true" ]]; then
            echo "At least one promotion target must be selected." >&2
            exit 1
          fi

      - name: Checkout sambee
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate public release scope
        id: scope
        shell: bash
        env:
          COMPANION_TOKEN: ${{ secrets.COMPANION_RELEASE_REPO_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          scope_dir="$RUNNER_TEMP/release-scope"
          mkdir -p "$scope_dir"
          gh release download "${{ inputs.sambee_release_tag }}" --pattern sambee-release.json --dir "$scope_dir"
          companion_tag="$(GH_TOKEN="$COMPANION_TOKEN" gh release view "${{ inputs.release_ref }}" \
            --repo "${{ env.COMPANION_RELEASE_REPO_OWNER }}/${{ env.COMPANION_RELEASE_REPO_NAME }}" \
            --json tagName --jq .tagName)"
          GH_TOKEN="$COMPANION_TOKEN" gh release download "$companion_tag" \
            --repo "${{ env.COMPANION_RELEASE_REPO_OWNER }}/${{ env.COMPANION_RELEASE_REPO_NAME }}" \
            --pattern companion-release-provenance.json \
            --dir "$scope_dir"
          python3 .github/scripts/validate_release_scope.py \
            --metadata-file "$scope_dir/sambee-release.json" \
            --component companion \
            --version "$(jq -r '.version' "$scope_dir/companion-release-provenance.json")" \
            --build-tag "$(jq -r '.build_tag' "$scope_dir/companion-release-provenance.json")" \
            --source-sha "$(jq -r '.source_sha' "$scope_dir/companion-release-provenance.json")"
          build_tag="$(jq -r '.build_tag' "$scope_dir/companion-release-provenance.json")"
          source_sha="$(jq -r '.source_sha' "$scope_dir/companion-release-provenance.json")"
          git fetch origin "refs/tags/$build_tag:refs/tags/$build_tag"
          if [[ "$(git rev-parse "refs/tags/$build_tag^{commit}")" != "$source_sha" ]]; then
            echo "Companion provenance source SHA does not match canonical tag $build_tag." >&2
            exit 1
          fi
          echo "scope=$(jq -r '.component_scope' "$scope_dir/sambee-release.json")" >> "$GITHUB_OUTPUT"
          echo "version=$(jq -r '.version' "$scope_dir/companion-release-provenance.json")" >> "$GITHUB_OUTPUT"
          echo "build_tag=$build_tag" >> "$GITHUB_OUTPUT"
          echo "source_sha=$source_sha" >> "$GITHUB_OUTPUT"

      - name: Set up crane
        if: ${{ steps.scope.outputs.scope == 'both' }}
        uses: ./.github/actions/setup-crane
        with:
          install-dir: ${{ runner.temp }}/bin

      - name: Set up ORAS
        if: ${{ steps.scope.outputs.scope == 'both' }}
        uses: ./.github/actions/setup-oras
        with:
          install-dir: ${{ runner.temp }}/bin

      - name: Verify coordinated Docker candidate
        if: ${{ steps.scope.outputs.scope == 'both' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git checkout --detach "${{ steps.scope.outputs.build_tag }}"
          owner_lower="$(printf '%s' "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          image_name="ghcr.io/$owner_lower/sambee"
          signature_repository="ghcr.io/$owner_lower/sambee-signatures"
          image_description="$(bash .github/scripts/read_website_description.sh)"
          source_url="https://github.com/${GITHUB_REPOSITORY}"
          crane auth login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"
          oras login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"
          candidate_ref="$image_name:${{ steps.scope.outputs.build_tag }}"
          candidate_digest="$(crane digest "$candidate_ref")"
          bash .github/scripts/verify_candidate_image.sh \
            --image-ref "$candidate_ref" \
            --expected-description "$image_description" \
            --expected-revision "${{ steps.scope.outputs.source_sha }}" \
            --expected-version "${{ steps.scope.outputs.version }}" \
            --expected-source "$source_url" \
            --expected-title Sambee \
            --expected-build-tag "${{ steps.scope.outputs.build_tag }}"
          bash .github/scripts/verify_candidate_metadata_bundle.sh \
            --image-ref "$image_name@$candidate_digest" \
            --metadata-repository "$signature_repository" \
            --expected-version "${{ steps.scope.outputs.version }}" \
            --expected-revision "${{ steps.scope.outputs.source_sha }}" \
            --expected-source "$source_url"

      - name: Checkout release repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ env.COMPANION_RELEASE_REPO_OWNER }}/${{ env.COMPANION_RELEASE_REPO_NAME }}
          ref: ${{ env.COMPANION_RELEASE_REPO_BRANCH }}
          token: ${{ secrets.COMPANION_RELEASE_REPO_TOKEN }}
          path: release-repo

      - name: Generate feed files
        env:
          GITHUB_TOKEN: ${{ secrets.COMPANION_RELEASE_REPO_TOKEN }}
        run: |
          args=()
          if [[ "${{ github.event.inputs.companion_channel_test }}" == "true" ]]; then
            args+=(--companion-channel-test)
          fi
          if [[ "${{ github.event.inputs.companion_channel_beta }}" == "true" ]]; then
            args+=(--companion-channel-beta)
          fi
          if [[ "${{ github.event.inputs.companion_channel_stable }}" == "true" ]]; then
            args+=(--companion-channel-stable)
          fi
          if [[ "${{ github.event.inputs.sambee }}" == "true" ]]; then
            args+=(--sambee)
          fi

          python3 .github/scripts/promote_companion_release.py \
            --release-ref "${{ github.event.inputs.release_ref }}" \
            --release-owner "${{ env.COMPANION_RELEASE_REPO_OWNER }}" \
            --release-repo "${{ env.COMPANION_RELEASE_REPO_NAME }}" \
            --release-repo-path "$PWD/release-repo" \
            "${args[@]}"

      - name: Commit and push feed updates
        env:
          GH_TOKEN: ${{ secrets.COMPANION_RELEASE_REPO_TOKEN }}
        run: |
          release_tag="$(gh release view "${{ inputs.release_ref }}" \
            --repo "${{ env.COMPANION_RELEASE_REPO_OWNER }}/${{ env.COMPANION_RELEASE_REPO_NAME }}" \
            --json tagName --jq .tagName)"

          git -C release-repo config user.name "github-actions[bot]"
          git -C release-repo config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C release-repo add docs/feeds

          if git -C release-repo diff --cached --quiet; then
            echo "No feed changes to commit."
            exit 0
          fi

          git -C release-repo commit -m "Promote ${release_tag} release feeds"
          git -C release-repo push origin HEAD:${{ env.COMPANION_RELEASE_REPO_BRANCH }}

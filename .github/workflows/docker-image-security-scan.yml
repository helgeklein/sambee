name: "Security: Docker Image Scan"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '41 4 * * 1'
  workflow_dispatch:

concurrency:
  group: docker-image-security-scan-main
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      created: ${{ steps.metadata.outputs.created }}
      os_packages_refresh_key: ${{ steps.metadata.outputs.os_packages_refresh_key }}
    steps:
    - name: Capture shared build timestamp
      id: metadata
      shell: bash
      run: |
        created="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
        printf 'created=%s\n' "$created" >> "$GITHUB_OUTPUT"
        printf 'os_packages_refresh_key=%s\n' "$created" >> "$GITHUB_OUTPUT"

  scan:
    needs: prepare
    runs-on: ${{ matrix.runner_label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - docker_platform: linux/amd64
            platform_id: amd64
            runner_label: ubuntu-24.04
          - docker_platform: linux/arm64
            platform_id: arm64
            runner_label: ubuntu-24.04-arm
    steps:
    - name: Checkout main
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        ref: refs/heads/main

    - name: Set up QEMU
      if: ${{ matrix.platform_id == 'amd64' }}
      uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

    - name: Sync and verify version metadata
      uses: ./.github/actions/sync-version-check

    - name: Write build metadata files
      shell: bash
      run: git rev-parse --short HEAD > GIT_COMMIT

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

    - name: Build image for security scan
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
      with:
        context: .
        file: ./Dockerfile
        load: true
        platforms: ${{ matrix.docker_platform }}
        build-args: |
          BUILD_CREATED_AT=${{ needs.prepare.outputs.created }}
          APT_REFRESH_KEY=${{ needs.prepare.outputs.os_packages_refresh_key }}
        tags: sambee:security-scan-${{ matrix.platform_id }}
        cache-from: type=gha,scope=docker-image-security-scan-${{ matrix.platform_id }}
        cache-to: type=gha,mode=max,scope=docker-image-security-scan-${{ matrix.platform_id }}

    - name: Resolve Trivy container image
      id: trivy-image
      shell: bash
      run: |
        trivy_image="$(bash .github/scripts/resolve_trivy_image.sh)"
        echo "image=$trivy_image" >> "$GITHUB_OUTPUT"

    - name: Show Trivy version
      shell: bash
      env:
        TRIVY_IMAGE: ${{ steps.trivy-image.outputs.image }}
      run: docker run --rm "${TRIVY_IMAGE}" --version

    - name: Scan main image for high and critical vulnerabilities
      shell: bash
      env:
        TRIVY_IMAGE: ${{ steps.trivy-image.outputs.image }}
      run: |
        docker run --rm \
          -v /var/run/docker.sock:/var/run/docker.sock \
          -v "$PWD:/work" \
          -w /work \
          "${TRIVY_IMAGE}" image \
          --ignorefile ./.trivyignore.yaml \
          --show-suppressed \
          --severity HIGH,CRITICAL \
          --ignore-unfixed \
          --pkg-types os,library \
          --format table \
          --exit-code 1 \
          sambee:security-scan-${{ matrix.platform_id }}

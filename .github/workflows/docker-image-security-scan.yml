name: "Security: Docker Image Scan"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '41 4 * * 1'
  workflow_dispatch:

concurrency:
  group: docker-image-security-scan-main
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      created: ${{ steps.metadata.outputs.created }}
    steps:
    - name: Capture shared build timestamp
      id: metadata
      shell: bash
      run: printf 'created=%s\n' "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

  scan:
    needs: prepare
    runs-on: ${{ matrix.runner_label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - docker_platform: linux/amd64
            platform_id: amd64
            runner_label: ubuntu-24.04
          - docker_platform: linux/arm64
            platform_id: arm64
            runner_label: ubuntu-24.04-arm
    steps:
    - name: Checkout main
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        ref: refs/heads/main

    - name: Set up QEMU
      if: ${{ matrix.platform_id == 'amd64' }}
      uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

    - name: Sync and verify version metadata
      uses: ./.github/actions/sync-version-check

    - name: Write build metadata files
      shell: bash
      run: git rev-parse --short HEAD > GIT_COMMIT

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

    - name: Build image for security scan
      uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
      with:
        context: .
        file: ./Dockerfile
        load: true
        platforms: ${{ matrix.docker_platform }}
        build-args: |
          BUILD_CREATED_AT=${{ needs.prepare.outputs.created }}
        tags: sambee:security-scan-${{ matrix.platform_id }}
        cache-from: type=gha,scope=docker-image-security-scan-${{ matrix.platform_id }}
        cache-to: type=gha,mode=max,scope=docker-image-security-scan-${{ matrix.platform_id }}

    - name: Resolve Trivy container image
      id: trivy-image
      shell: bash
      run: |
        trivy_image="$(bash .github/scripts/resolve_trivy_image.sh)"
        echo "image=$trivy_image" >> "$GITHUB_OUTPUT"

    - name: Show Trivy version
      shell: bash
      env:
        TRIVY_IMAGE: ${{ steps.trivy-image.outputs.image }}
      run: docker run --rm "${TRIVY_IMAGE}" --version

    - name: Scan main image for high and critical vulnerabilities
      shell: bash
      env:
        TRIVY_IMAGE: ${{ steps.trivy-image.outputs.image }}
      run: |
        docker run --rm \
          -v /var/run/docker.sock:/var/run/docker.sock \
          -v "$PWD:/work" \
          -w /work \
          "${TRIVY_IMAGE}" image \
          --ignorefile ./.trivyignore.yaml \
          --show-suppressed \
          --severity HIGH,CRITICAL \
          --ignore-unfixed \
            --pkg-types os,library \
          --format table \
          --exit-code 1 \
          sambee:security-scan-${{ matrix.platform_id }}

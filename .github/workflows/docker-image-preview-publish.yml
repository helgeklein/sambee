name: "Release: Create Docker Image"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_TITLE: Sambee
  TRIVY_IGNORE_FILE: ./.trivyignore.yaml

on:
  workflow_dispatch:
    inputs:
      build_version:
        description: Existing immutable build version to publish. Leave empty to reserve the VERSION at this main commit.
        required: false
        type: string

concurrency:
  group: docker-release-publication
  cancel-in-progress: false

permissions:
  contents: write
  packages: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      checkout_ref: ${{ steps.preflight.outputs.source_sha }}
      source_ref_name: ${{ steps.preflight.outputs.build_tag }}
      build_tag: ${{ steps.preflight.outputs.build_tag }}
      version: ${{ steps.metadata.outputs.version }}
      image_description: ${{ steps.metadata.outputs.image_description }}
      image_name: ${{ steps.metadata.outputs.image_name }}
      signature_repository: ${{ steps.metadata.outputs.signature_repository }}
      full_sha: ${{ steps.metadata.outputs.full_sha }}
      source_url: ${{ steps.metadata.outputs.source_url }}
      created: ${{ steps.metadata.outputs.created }}
      os_packages_refresh_key: ${{ steps.metadata.outputs.os_packages_refresh_key }}
      publication_state: ${{ steps.candidate-state.outputs.state }}
      candidate_digest: ${{ steps.candidate-state.outputs.digest }}
    steps:
    - name: Reserve or resolve canonical build source
      id: preflight
      uses: ./.github/actions/release-candidate-preflight
      with:
        build-version: ${{ inputs.build_version }}
        dispatch-ref: ${{ github.ref }}
        dispatch-sha: ${{ github.sha }}
        run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

    - name: Resolve preview metadata
      id: metadata
      shell: bash
      run: |
        owner_lower="$(printf '%s' "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
        image_description="$(bash .github/scripts/read_website_description.sh)"
        created="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

        echo "version=${{ steps.preflight.outputs.version }}" >> "$GITHUB_OUTPUT"
        {
          echo 'image_description<<EOF'
          echo "$image_description"
          echo 'EOF'
        } >> "$GITHUB_OUTPUT"
        echo "image_name=ghcr.io/$owner_lower/sambee" >> "$GITHUB_OUTPUT"
        echo "signature_repository=ghcr.io/$owner_lower/sambee-signatures" >> "$GITHUB_OUTPUT"
        echo "full_sha=${{ steps.preflight.outputs.source_sha }}" >> "$GITHUB_OUTPUT"
        echo "source_url=https://github.com/${GITHUB_REPOSITORY}" >> "$GITHUB_OUTPUT"
        echo "created=$created" >> "$GITHUB_OUTPUT"
        echo "os_packages_refresh_key=$created" >> "$GITHUB_OUTPUT"

    - name: Set up crane
      uses: ./.github/actions/setup-crane
      with:
        install-dir: ${{ runner.temp }}/bin

    - name: Set up ORAS
      uses: ./.github/actions/setup-oras
      with:
        install-dir: ${{ runner.temp }}/bin

    - name: Install Cosign
      uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

    - name: Log in to GHCR with crane
      shell: bash
      run: crane auth login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"

    - name: Log in to GHCR with ORAS
      shell: bash
      run: oras login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"

    - name: Resolve Docker candidate publication state
      id: candidate-state
      shell: bash
      run: |
        candidate_ref="${{ steps.metadata.outputs.image_name }}:${{ steps.preflight.outputs.build_tag }}"
        if ! candidate_digest="$(crane digest "$candidate_ref" 2>/dev/null)"; then
          echo "state=build" >> "$GITHUB_OUTPUT"
          echo 'Docker candidate marker is absent; selecting build path.' >> "$GITHUB_STEP_SUMMARY"
          exit 0
        fi

        verified_output="$RUNNER_TEMP/verified-candidate-digest"
        GITHUB_OUTPUT="$verified_output" bash .github/scripts/verify_published_candidate_image.sh \
          --image-name "${{ steps.metadata.outputs.image_name }}" \
          --metadata-repository "${{ steps.metadata.outputs.signature_repository }}" \
          --expected-description "${{ steps.metadata.outputs.image_description }}" \
          --expected-revision "${{ steps.metadata.outputs.full_sha }}" \
          --expected-version "${{ steps.preflight.outputs.version }}" \
          --expected-source "${{ steps.metadata.outputs.source_url }}" \
          --expected-title "${{ env.IMAGE_TITLE }}" \
          --expected-build-tag "${{ steps.preflight.outputs.build_tag }}" \
          --github-repository "${{ github.repository }}"
        verified_digest="$(awk -F= '$1 == "resolved_digest" { print $2 }' "$verified_output")"
        if [[ "$verified_digest" != "$candidate_digest" ]]; then
          echo "Published candidate verifier resolved $verified_digest, but marker resolved $candidate_digest." >&2
          exit 1
        fi
        echo "state=repair" >> "$GITHUB_OUTPUT"
        echo "digest=$verified_digest" >> "$GITHUB_OUTPUT"
        echo "Docker candidate marker already exists at \`$candidate_digest\`; selecting repair-only path." >> "$GITHUB_STEP_SUMMARY"

  validate-tests:
    needs: prepare
    if: ${{ needs.prepare.outputs.publication_state == 'build' }}
    runs-on: ubuntu-latest
    container:
      image: python:3.13.12-slim@sha256:f1927c75e81efd1e091dbd64b6c0ecaa5630b38635a3d1c04034ac636e1f94c8
    defaults:
      run:
        shell: bash
    permissions:
      contents: read
    steps:
    - name: Checkout source code
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        ref: ${{ needs.prepare.outputs.checkout_ref }}

    - name: Sync and verify version metadata
      uses: ./.github/actions/sync-version-check

    - name: Install backend system dependencies
      run: bash scripts/install-system-deps

    - name: Install backend test dependencies
      run: python -m pip install --require-hashes -r backend/requirements-dev.lock.txt

    - name: Generate backend test images
      run: QUIET=1 scripts/setup-test-images

    - name: Run backend type checks
      run: cd backend && mypy app

    - name: Run backend tests (excluding performance)
      env:
        SECRET_KEY: test-secret-key-for-ci-only-not-for-production-use
        ENCRYPTION_KEY: YYFPojCh_1WUExv5xXVEyFe0ITw_5dgZZ-fC-iZk3nU=
      run: cd backend && pytest -n auto -m 'not performance' -v

    - name: Run backend performance tests
      env:
        SECRET_KEY: test-secret-key-for-ci-only-not-for-production-use
        ENCRYPTION_KEY: YYFPojCh_1WUExv5xXVEyFe0ITw_5dgZZ-fC-iZk3nU=
      run: cd backend && pytest -m performance -v

    - name: Set up Node.js
      uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      run: cd frontend && npm ci --prefer-offline

    - name: Run frontend type checks
      run: cd frontend && npx tsc --noEmit

    - name: Run frontend tests
      run: cd frontend && npm run test:ci

  build-and-validate-platforms:
    needs: [prepare, validate-tests]
    if: ${{ needs.prepare.outputs.publication_state == 'build' }}
    runs-on: ${{ matrix.runner_label }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - docker_platform: linux/amd64
            platform_id: amd64
            runner_label: ubuntu-24.04
          - docker_platform: linux/arm64
            platform_id: arm64
            runner_label: ubuntu-24.04-arm
    steps:
    - name: Checkout source code
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        ref: ${{ needs.prepare.outputs.checkout_ref }}

    - name: Sync and verify version metadata
      uses: ./.github/actions/sync-version-check

    - name: Write build metadata files
      shell: bash
      run: git rev-parse HEAD > GIT_COMMIT

    - name: Prepare preview platform image metadata
      id: image
      shell: bash
      run: |
        bash .github/scripts/write_docker_image_metadata_outputs.sh \
          --created "${{ needs.prepare.outputs.created }}" \
          --description "${{ needs.prepare.outputs.image_description }}" \
          --ref-name "${{ needs.prepare.outputs.source_ref_name }}" \
          --revision "${{ needs.prepare.outputs.full_sha }}" \
          --source-url "${{ needs.prepare.outputs.source_url }}" \
          --title "${{ env.IMAGE_TITLE }}" \
          --version "${{ needs.prepare.outputs.version }}" \
          --build-tag "${{ needs.prepare.outputs.build_tag }}" \
          --annotation-platform "${{ matrix.docker_platform }}"

    - name: Log in to GHCR
      uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

    - name: Build and push preview platform image
      id: build
      uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
      with:
        annotations: ${{ steps.image.outputs.annotations }}
        context: .
        file: ./Dockerfile
        platforms: ${{ matrix.docker_platform }}
        outputs: type=image,name=${{ needs.prepare.outputs.image_name }}:staging-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.platform_id }},push-by-digest=true,name-canonical=true,push=true
        labels: ${{ steps.image.outputs.labels }}
        build-args: |
          BUILD_CREATED_AT=${{ needs.prepare.outputs.created }}
          APT_REFRESH_KEY=${{ needs.prepare.outputs.os_packages_refresh_key }}
        cache-from: |
          type=gha,scope=preview-docker-image-${{ matrix.platform_id }}
          type=gha,scope=preview-docker-image
        cache-to: type=gha,mode=max,scope=preview-docker-image-${{ matrix.platform_id }}
        provenance: false
        sbom: false

    - name: Write preview platform digest
      shell: bash
      run: |
        digest_dir="${{ runner.temp }}/platform-digest-${{ matrix.platform_id }}"
        mkdir -p "$digest_dir"
        printf '%s\n' '${{ steps.build.outputs.digest }}' > "$digest_dir/digest-${{ matrix.platform_id }}"

    - name: Publish preview platform digest artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: platform-image-${{ matrix.platform_id }}
        path: ${{ runner.temp }}/platform-digest-${{ matrix.platform_id }}/digest-${{ matrix.platform_id }}
        if-no-files-found: error
        retention-days: 1

    - name: Pull preview platform image for validation
      shell: bash
      run: docker pull --platform ${{ matrix.docker_platform }} "${{ needs.prepare.outputs.image_name }}@${{ steps.build.outputs.digest }}"

    - name: Start preview platform validation container
      shell: bash
      run: |
        docker run -d \
          --platform ${{ matrix.docker_platform }} \
          --name sambee-preview-smoke-${{ matrix.platform_id }} \
          -p 8000:8000 \
          -e SECRET_KEY=test-secret-key-for-ci-only-not-for-production-use \
          -e ENCRYPTION_KEY=YYFPojCh_1WUExv5xXVEyFe0ITw_5dgZZ-fC-iZk3nU= \
          "${{ needs.prepare.outputs.image_name }}@${{ steps.build.outputs.digest }}"

    - name: Wait for preview health endpoint
      shell: bash
      run: |
        for attempt in $(seq 1 60); do
          if ! docker container inspect sambee-preview-smoke-${{ matrix.platform_id }} >/dev/null 2>&1; then
            echo "Validation container disappeared before health check completed" >&2
            exit 1
          fi

          if [[ "$(docker inspect -f '{{.State.Running}}' sambee-preview-smoke-${{ matrix.platform_id }})" != "true" ]]; then
            echo "Validation container exited before /api/health became ready" >&2
            docker logs sambee-preview-smoke-${{ matrix.platform_id }} || true
            exit 1
          fi

          if curl --fail --silent http://127.0.0.1:8000/api/health >/dev/null; then
            exit 0
          fi
          sleep 2
        done

        echo "Timed out waiting for /api/health" >&2
        docker logs sambee-preview-smoke-${{ matrix.platform_id }} || true
        exit 1

    - name: Resolve Trivy container image
      id: trivy-image
      shell: bash
      run: |
        trivy_image="$(bash .github/scripts/resolve_trivy_image.sh)"
        echo "image=$trivy_image" >> "$GITHUB_OUTPUT"

    - name: Show Trivy version
      shell: bash
      env:
        TRIVY_IMAGE: ${{ steps.trivy-image.outputs.image }}
      run: docker run --rm "${TRIVY_IMAGE}" --version

    - name: Scan preview image before publish
      shell: bash
      env:
        TRIVY_IMAGE: ${{ steps.trivy-image.outputs.image }}
      run: |
        set +e

        docker run --rm \
          -v /var/run/docker.sock:/var/run/docker.sock \
          -v "$PWD:/work" \
          -w /work \
          "${TRIVY_IMAGE}" image \
          --ignorefile "${TRIVY_IGNORE_FILE}" \
          --show-suppressed \
          --severity HIGH,CRITICAL \
          --ignore-unfixed \
          --pkg-types os,library \
          --format table \
          --exit-code 1 \
          "${{ needs.prepare.outputs.image_name }}@${{ steps.build.outputs.digest }}"

        scan_status=$?
        set -e

        if [[ "$scan_status" -ne 0 ]]; then
          echo "::warning::Trivy found HIGH or CRITICAL vulnerabilities in this preview publish. Findings are advisory for the test channel and publication will continue."
        fi

    - name: Print preview validation logs on failure
      if: failure()
      shell: bash
      run: |
        if docker container inspect sambee-preview-smoke-${{ matrix.platform_id }} >/dev/null 2>&1; then
          docker logs sambee-preview-smoke-${{ matrix.platform_id }}
        else
          echo "Validation container is no longer available for log collection"
        fi

    - name: Clean up preview validation container
      if: always()
      shell: bash
      run: docker rm -f sambee-preview-smoke-${{ matrix.platform_id }} || true

  build-and-publish-immutable:
    needs: [prepare, build-and-validate-platforms]
    if: ${{ needs.prepare.outputs.publication_state == 'build' }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.assemble.outputs.digest }}
    steps:
    - name: Checkout source code
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        ref: ${{ needs.prepare.outputs.checkout_ref }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

    - name: Set up crane
      uses: ./.github/actions/setup-crane
      with:
        install-dir: ${{ runner.temp }}/bin

    - name: Log in to GHCR
      uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Log in to GHCR with crane
      shell: bash
      run: crane auth login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"

    - name: Download preview platform digests
      shell: bash
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        platform_digest_dir="${{ runner.temp }}/platform-digests"
        mkdir -p "$platform_digest_dir"
        gh run download "$GITHUB_RUN_ID" --name platform-image-amd64 --dir "$platform_digest_dir"
        gh run download "$GITHUB_RUN_ID" --name platform-image-arm64 --dir "$platform_digest_dir"

    - name: Assemble immutable preview image index
      id: assemble
      shell: bash
      env:
        IMAGE_NAME: ${{ needs.prepare.outputs.image_name }}
        IMAGE_CREATED: ${{ needs.prepare.outputs.created }}
        IMAGE_DESCRIPTION: ${{ needs.prepare.outputs.image_description }}
        IMAGE_REF_NAME: ${{ needs.prepare.outputs.source_ref_name }}
        IMAGE_REVISION: ${{ needs.prepare.outputs.full_sha }}
        IMAGE_SOURCE_URL: ${{ needs.prepare.outputs.source_url }}
        IMAGE_TITLE_VALUE: ${{ env.IMAGE_TITLE }}
        IMAGE_VERSION: ${{ needs.prepare.outputs.version }}
        IMAGE_BUILD_TAG: ${{ needs.prepare.outputs.build_tag }}
      run: |
        image_name="$IMAGE_NAME"
        index_ref="$image_name:staging-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-index"
        platform_digest_dir="${{ runner.temp }}/platform-digests"
        amd64_digest="$(tr -d '[:space:]' < "$platform_digest_dir/digest-amd64")"
        arm64_digest="$(tr -d '[:space:]' < "$platform_digest_dir/digest-arm64")"

        for digest_name in amd64_digest arm64_digest; do
          digest_value="${!digest_name}"
          if ! [[ "$digest_value" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "Downloaded platform digest $digest_name is invalid: $digest_value" >&2
            exit 1
          fi
        done

        metadata_entries=(
          "org.opencontainers.image.created=$IMAGE_CREATED"
          "org.opencontainers.image.description=$IMAGE_DESCRIPTION"
          "org.opencontainers.image.licenses=MIT"
          "org.opencontainers.image.ref.name=$IMAGE_REF_NAME"
          "org.opencontainers.image.revision=$IMAGE_REVISION"
          "org.opencontainers.image.source=$IMAGE_SOURCE_URL"
          "org.opencontainers.image.title=$IMAGE_TITLE_VALUE"
          "org.opencontainers.image.url=$IMAGE_SOURCE_URL"
          "org.opencontainers.image.version=$IMAGE_VERSION"
          "org.sambee.build-tag=$IMAGE_BUILD_TAG"
        )

        annotation_args=()
        for entry in "${metadata_entries[@]}"; do
          annotation_args+=(--annotation "index:$entry")
        done

        docker buildx imagetools create \
          --tag "$index_ref" \
          "${annotation_args[@]}" \
          "$image_name@$amd64_digest" \
          "$image_name@$arm64_digest"

        index_digest="$(crane digest "$index_ref")"
        index_json="$(crane manifest "$index_ref")"
        index_media_type="$(jq -r '.mediaType // empty' <<<"$index_json")"
        runnable_manifest_count="$(jq '[.manifests[]? | select((.platform.os // "") != "unknown") | select((.platform.architecture // "") != "unknown")] | length' <<<"$index_json")"

        if [[ "$index_media_type" != "application/vnd.oci.image.index.v1+json" && "$index_media_type" != "application/vnd.docker.distribution.manifest.list.v2+json" ]]; then
          echo "Assembled preview candidate is not a supported multi-platform image index: $index_media_type" >&2
          exit 1
        fi

        if [[ "$runnable_manifest_count" != "2" ]]; then
          echo "Assembled preview candidate should contain exactly 2 runnable manifests, got $runnable_manifest_count" >&2
          exit 1
        fi

        echo "digest=$index_digest" >> "$GITHUB_OUTPUT"

    - name: Verify assembled preview image metadata
      shell: bash
      run: |
        bash .github/scripts/verify_candidate_image.sh \
          --image-ref "${{ needs.prepare.outputs.image_name }}@${{ steps.assemble.outputs.digest }}" \
          --expected-description "${{ needs.prepare.outputs.image_description }}" \
          --expected-revision "${{ needs.prepare.outputs.full_sha }}" \
          --expected-version "${{ needs.prepare.outputs.version }}" \
          --expected-source "${{ needs.prepare.outputs.source_url }}" \
          --expected-title "${{ env.IMAGE_TITLE }}" \
          --expected-build-tag "${{ needs.prepare.outputs.build_tag }}"

  build-metadata-platforms:
    needs: [prepare, build-and-publish-immutable]
    if: ${{ needs.prepare.outputs.publication_state == 'build' }}
    runs-on: ${{ matrix.runner_label }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - docker_platform: linux/amd64
            platform_id: amd64
            runner_label: ubuntu-24.04
          - docker_platform: linux/arm64
            platform_id: arm64
            runner_label: ubuntu-24.04-arm
    steps:
    - name: Checkout source code
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        ref: ${{ needs.prepare.outputs.checkout_ref }}

    - name: Sync and verify version metadata
      uses: ./.github/actions/sync-version-check

    - name: Write build metadata files
      shell: bash
      run: git rev-parse HEAD > GIT_COMMIT

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

    - name: Set up crane
      uses: ./.github/actions/setup-crane
      with:
        install-dir: ${{ runner.temp }}/bin

    - name: Log in to GHCR with crane
      shell: bash
      run: crane auth login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"

    - name: Prepare attested platform export metadata
      id: image
      shell: bash
      run: |
        bash .github/scripts/write_docker_image_metadata_outputs.sh \
          --created "${{ needs.prepare.outputs.created }}" \
          --description "${{ needs.prepare.outputs.image_description }}" \
          --ref-name "${{ needs.prepare.outputs.source_ref_name }}" \
          --revision "${{ needs.prepare.outputs.full_sha }}" \
          --source-url "${{ needs.prepare.outputs.source_url }}" \
          --title "${{ env.IMAGE_TITLE }}" \
          --version "${{ needs.prepare.outputs.version }}" \
          --build-tag "${{ needs.prepare.outputs.build_tag }}" \
          --annotation-platform "${{ matrix.docker_platform }}"

    - name: Export attested platform OCI layout
      uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
      with:
        annotations: ${{ steps.image.outputs.annotations }}
        context: .
        file: ./Dockerfile
        platforms: ${{ matrix.docker_platform }}
        outputs: type=oci,dest=${{ runner.temp }}/attested-image-${{ matrix.platform_id }},tar=false,oci-mediatypes=true
        labels: ${{ steps.image.outputs.labels }}
        build-args: |
          BUILD_CREATED_AT=${{ needs.prepare.outputs.created }}
          APT_REFRESH_KEY=${{ needs.prepare.outputs.os_packages_refresh_key }}
        cache-from: |
          type=gha,scope=preview-docker-image-${{ matrix.platform_id }}
          type=gha,scope=preview-docker-image
        provenance: true
        sbom: true

    - name: Extract platform metadata payload
      shell: bash
      run: |
        platform_bundle_dir="${{ runner.temp }}/metadata-platform-${{ matrix.platform_id }}"
        bash .github/scripts/extract_metadata_platform_from_oci.sh \
          --oci-layout "${{ runner.temp }}/attested-image-${{ matrix.platform_id }}" \
          --image-ref "${{ needs.prepare.outputs.image_name }}@${{ needs.build-and-publish-immutable.outputs.digest }}" \
          --platform "${{ matrix.docker_platform }}" \
          --output-dir "$platform_bundle_dir"

    - name: Upload platform metadata payload
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: metadata-platform-${{ matrix.platform_id }}
        path: ${{ runner.temp }}/metadata-platform-${{ matrix.platform_id }}
        if-no-files-found: error
        retention-days: 1

  build-metadata-bundle:
    needs: [prepare, build-and-publish-immutable, build-metadata-platforms]
    if: ${{ needs.prepare.outputs.publication_state == 'build' }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      packages: write
    steps:
    - name: Checkout source code
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        ref: ${{ needs.prepare.outputs.checkout_ref }}

    - name: Set up crane
      uses: ./.github/actions/setup-crane
      with:
        install-dir: ${{ runner.temp }}/bin

    - name: Set up ORAS
      uses: ./.github/actions/setup-oras
      with:
        install-dir: ${{ runner.temp }}/bin

    - name: Log in to GHCR with crane
      shell: bash
      run: crane auth login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"

    - name: Log in to GHCR with ORAS
      shell: bash
      run: oras login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"

    - name: Download platform metadata payloads
      shell: bash
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        platform_input_dir="${{ runner.temp }}/metadata-platforms"
        mkdir -p "$platform_input_dir"
        gh run download "$GITHUB_RUN_ID" --name metadata-platform-amd64 --dir "$platform_input_dir"
        gh run download "$GITHUB_RUN_ID" --name metadata-platform-arm64 --dir "$platform_input_dir"

    - name: Assemble metadata bundle
      shell: bash
      run: |
        bundle_dir="${{ runner.temp }}/metadata-bundle"
        bash .github/scripts/assemble_metadata_bundle.sh \
          --input-dir "${{ runner.temp }}/metadata-platforms" \
          --image-ref "${{ needs.prepare.outputs.image_name }}@${{ needs.build-and-publish-immutable.outputs.digest }}" \
          --metadata-repository "${{ needs.prepare.outputs.signature_repository }}" \
          --version "${{ needs.prepare.outputs.version }}" \
          --revision "${{ needs.prepare.outputs.full_sha }}" \
          --source-url "${{ needs.prepare.outputs.source_url }}" \
          --output-dir "$bundle_dir"

    - name: Publish metadata bundle
      shell: bash
      run: |
        bash .github/scripts/publish_metadata_bundle.sh \
          --bundle-dir "${{ runner.temp }}/metadata-bundle" \
          --metadata-repository "${{ needs.prepare.outputs.signature_repository }}" \
          --image-digest "${{ needs.build-and-publish-immutable.outputs.digest }}"

  sign-preview:
    needs: [prepare, build-and-publish-immutable, build-metadata-bundle]
    if: ${{ needs.prepare.outputs.publication_state == 'build' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
    - name: Install Cosign
      uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

    - name: Log in to GHCR
      uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Sign preview digest
      shell: bash
      env:
        COSIGN_REPOSITORY: ${{ needs.prepare.outputs.signature_repository }}
      run: |
        bash .github/scripts/ensure_candidate_signature.sh \
          --image-ref "${{ needs.prepare.outputs.image_name }}@${{ needs.build-and-publish-immutable.outputs.digest }}" \
          --github-repository "${{ github.repository }}"

  verify-signed-candidate:
    needs: [prepare, sign-preview]
    if: ${{ needs.prepare.outputs.publication_state == 'build' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      candidate_digest: ${{ steps.verify.outputs.resolved_digest }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

    - name: Set up crane
      uses: ./.github/actions/setup-crane
      with:
        install-dir: ${{ runner.temp }}/bin

    - name: Set up ORAS
      uses: ./.github/actions/setup-oras
      with:
        install-dir: ${{ runner.temp }}/bin

    - name: Install Cosign
      uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

    - name: Log in to GHCR with crane
      shell: bash
      run: crane auth login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"

    - name: Log in to GHCR with ORAS
      shell: bash
      run: oras login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"

    - name: Verify signed candidate
      id: verify
      shell: bash
      run: |
        bash .github/scripts/verify_published_candidate_image.sh \
          --image-name "${{ needs.prepare.outputs.image_name }}" \
          --metadata-repository "${{ needs.prepare.outputs.signature_repository }}" \
          --candidate-digest "${{ needs.build-and-publish-immutable.outputs.digest }}" \
          --expected-description "${{ needs.prepare.outputs.image_description }}" \
          --expected-revision "${{ needs.prepare.outputs.full_sha }}" \
          --expected-version "${{ needs.prepare.outputs.version }}" \
          --expected-source "${{ needs.prepare.outputs.source_url }}" \
          --expected-title "${{ env.IMAGE_TITLE }}" \
          --expected-build-tag "${{ needs.prepare.outputs.build_tag }}" \
          --github-repository "${{ github.repository }}"

  publish-immutable-markers:
    needs: [prepare, verify-signed-candidate]
    if: ${{ needs.prepare.outputs.publication_state == 'build' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

    - name: Set up crane
      uses: ./.github/actions/setup-crane
      with:
        install-dir: ${{ runner.temp }}/bin

    - name: Log in to GHCR with crane
      shell: bash
      run: crane auth login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"

    - name: Create or verify immutable build markers
      shell: bash
      run: |
        bash .github/scripts/promote_container_image.sh \
          --image-name "${{ needs.prepare.outputs.image_name }}" \
          --source-digest "${{ needs.verify-signed-candidate.outputs.candidate_digest }}" \
          --tag "${{ needs.prepare.outputs.build_tag }}" \
          --tag "sha-${{ needs.prepare.outputs.full_sha }}" \
          --tag "${{ needs.prepare.outputs.version }}" \
          --immutable

  promote-test-tag:
    needs: [prepare, verify-signed-candidate, publish-immutable-markers]
    if: ${{ needs.prepare.outputs.publication_state == 'build' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

    - name: Set up crane
      uses: ./.github/actions/setup-crane
      with:
        install-dir: ${{ runner.temp }}/bin

    - name: Log in to GHCR with crane
      shell: bash
      run: crane auth login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"

    - name: Promote verified build digest to test
      shell: bash
      run: |
        bash .github/scripts/promote_container_image.sh \
          --image-name "${{ needs.prepare.outputs.image_name }}" \
          --source-digest "${{ needs.verify-signed-candidate.outputs.candidate_digest }}" \
          --tag test

  cleanup-staging-image:
    if: ${{ always() && needs.prepare.outputs.publication_state == 'build' }}
    needs: [prepare, build-and-publish-immutable, sign-preview, verify-signed-candidate, publish-immutable-markers, promote-test-tag]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
    - name: Set up crane
      uses: ./.github/actions/setup-crane
      with:
        install-dir: ${{ runner.temp }}/bin

    - name: Log in to GHCR with crane
      shell: bash
      run: crane auth login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"

    - name: Delete run-scoped staging tags
      shell: bash
      run: |
        for platform in amd64 arm64 index; do
          staging_tag="staging-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${platform}"
          if ! crane delete "${{ needs.prepare.outputs.image_name }}:$staging_tag"; then
            echo "::warning::Unable to delete run-scoped staging tag $staging_tag. Registry retention must remove it."
          fi
        done

  repair-candidate-aliases:
    needs: prepare
    if: ${{ needs.prepare.outputs.publication_state == 'repair' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Set up crane
      uses: ./.github/actions/setup-crane
      with:
        install-dir: ${{ runner.temp }}/bin

    - name: Log in to GHCR with crane
      shell: bash
      run: crane auth login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"

    - name: Create or verify missing immutable aliases
      shell: bash
      run: |
        bash .github/scripts/promote_container_image.sh \
          --image-name "${{ needs.prepare.outputs.image_name }}" \
          --source-digest "${{ needs.prepare.outputs.candidate_digest }}" \
          --tag "sha-${{ needs.prepare.outputs.full_sha }}" \
          --tag "${{ needs.prepare.outputs.version }}" \
          --immutable

    - name: Move test alias to the verified candidate
      shell: bash
      run: |
        bash .github/scripts/promote_container_image.sh \
          --image-name "${{ needs.prepare.outputs.image_name }}" \
          --source-digest "${{ needs.prepare.outputs.candidate_digest }}" \
          --tag test

  summarize-candidate:
    if: ${{ always() }}
    needs: [prepare, verify-signed-candidate, cleanup-staging-image, repair-candidate-aliases]
    runs-on: ubuntu-latest
    steps:
    - name: Summarize candidate publication
      shell: bash
      run: |
        candidate_digest="${{ needs.verify-signed-candidate.outputs.candidate_digest }}"
        if [[ "${{ needs.prepare.outputs.publication_state }}" == "repair" ]]; then
          candidate_digest="${{ needs.prepare.outputs.candidate_digest }}"
        fi

        {
          echo '## Docker Candidate Publication'
          echo
          echo "- Canonical source tag: \`${{ needs.prepare.outputs.build_tag }}\`"
          echo "- Source SHA: \`${{ needs.prepare.outputs.full_sha }}\`"
          echo "- Final digest: \`${candidate_digest:-unavailable}\`"
          echo "- Docker version marker: \`${{ needs.prepare.outputs.image_name }}:${{ needs.prepare.outputs.build_tag }}\`"
          echo "- Movable test tag: \`${{ needs.prepare.outputs.image_name }}:test\`"
          if [[ "${{ needs.prepare.outputs.publication_state }}" == "build" ]]; then
            echo "- Staging references: \`${{ needs.prepare.outputs.image_name }}:staging-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-{amd64,arm64,index}\`"
          else
            echo '- Staging references: not created during repair-only publication.'
          fi
        } >> "$GITHUB_STEP_SUMMARY"

name: "Release: Publish Docker Image"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_TITLE: Sambee

on:
  release:
    types: [ published ]

concurrency:
  group: publish-docker-image-${{ github.event.release.tag_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      checkout_ref: ${{ steps.metadata.outputs.checkout_ref }}
      release_type: ${{ steps.metadata.outputs.release_type }}
      release_image_tag: ${{ steps.metadata.outputs.release_image_tag }}
      version: ${{ steps.metadata.outputs.version }}
      image_description: ${{ steps.metadata.outputs.image_description }}
      major_minor: ${{ steps.metadata.outputs.major_minor }}
      prerelease_series: ${{ steps.metadata.outputs.prerelease_series }}
      image_name: ${{ steps.metadata.outputs.image_name }}
      signature_repository: ${{ steps.metadata.outputs.signature_repository }}
      full_sha: ${{ steps.metadata.outputs.full_sha }}
      source_url: ${{ steps.metadata.outputs.source_url }}
    steps:
    - name: Checkout tagged code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        ref: ${{ github.event.release.tag_name }}

    - name: Sync and verify version metadata
      uses: ./.github/actions/sync-version-check

    - name: Resolve release metadata
      id: metadata
      shell: bash
      run: |
        version="$(tr -d '[:space:]' < VERSION)"
        release_tag="${{ github.event.release.tag_name }}"

        if [[ "$release_tag" != v* ]]; then
          echo "Release tag must start with v, got $release_tag" >&2
          exit 1
        fi

        release_image_tag="${release_tag#v}"

        full_sha="$(git rev-parse HEAD)"
        major_minor="$(printf '%s' "$version" | cut -d. -f1-2)"
        owner_lower="$(printf '%s' "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
        image_description="$(bash .github/scripts/read_website_description.sh)"

        if [[ "${{ github.event.release.prerelease }}" == "true" ]]; then
          release_type="beta"
          prerelease_series="${major_minor}-beta"

          if [[ "$release_image_tag" != "$version"-* ]]; then
            echo "Prerelease tag must start with v$version-, got $release_tag" >&2
            exit 1
          fi
        else
          release_type="stable"
          prerelease_series=""

          expected_tag="v$version"
          if [[ "$release_tag" != "$expected_tag" ]]; then
            echo "Release tag $expected_tag expected, got $release_tag" >&2
            exit 1
          fi
        fi

        echo "checkout_ref=$release_tag" >> "$GITHUB_OUTPUT"
        echo "release_type=$release_type" >> "$GITHUB_OUTPUT"
        echo "release_image_tag=$release_image_tag" >> "$GITHUB_OUTPUT"
        echo "version=$version" >> "$GITHUB_OUTPUT"
        {
          echo 'image_description<<EOF'
          echo "$image_description"
          echo 'EOF'
        } >> "$GITHUB_OUTPUT"
        echo "major_minor=$major_minor" >> "$GITHUB_OUTPUT"
        echo "prerelease_series=$prerelease_series" >> "$GITHUB_OUTPUT"
        echo "image_name=ghcr.io/$owner_lower/sambee" >> "$GITHUB_OUTPUT"
        echo "signature_repository=ghcr.io/$owner_lower/sambee-signatures" >> "$GITHUB_OUTPUT"
        echo "full_sha=$full_sha" >> "$GITHUB_OUTPUT"
        echo "source_url=https://github.com/${GITHUB_REPOSITORY}" >> "$GITHUB_OUTPUT"

  resolve-candidate-artifact:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      candidate_digest: ${{ steps.resolve.outputs.candidate_digest }}
      candidate_source_tag: ${{ steps.resolve.outputs.candidate_source_tag }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up crane
      uses: ./.github/actions/setup-crane
      with:
        install-dir: ${{ runner.temp }}/bin

    - name: Log in to GHCR with crane
      shell: bash
      run: crane auth login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"

    - name: Resolve candidate digest
      id: resolve
      shell: bash
      run: |
        candidate_source_tag="sha-${{ needs.prepare.outputs.full_sha }}"
        candidate_ref="${{ needs.prepare.outputs.image_name }}:${candidate_source_tag}"

        set +e
        candidate_digest="$(crane digest "$candidate_ref" 2>&1)"
        status=$?
        set -e

        if [[ $status -ne 0 ]]; then
          echo "Preview candidate image not found for commit ${{ needs.prepare.outputs.full_sha }}." >&2
          echo "Expected candidate tag: $candidate_ref" >&2
          echo "Release promotion only promotes an already published preview candidate." >&2
          echo "Run the 'Release: Create Docker Image' workflow for this exact commit first, then rerun this release workflow." >&2
          echo >&2
          echo "crane output:" >&2
          echo "$candidate_digest" >&2
          exit 1
        fi

        echo "candidate_digest=$candidate_digest" >> "$GITHUB_OUTPUT"
        echo "candidate_source_tag=$candidate_source_tag" >> "$GITHUB_OUTPUT"

  verify-candidate-artifact:
    needs: [prepare, resolve-candidate-artifact]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up crane
      uses: ./.github/actions/setup-crane
      with:
        install-dir: ${{ runner.temp }}/bin

    - name: Set up ORAS
      uses: ./.github/actions/setup-oras
      with:
        install-dir: ${{ runner.temp }}/bin

    - name: Log in to GHCR with crane
      shell: bash
      run: crane auth login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"

    - name: Log in to GHCR with ORAS
      shell: bash
      run: oras login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"

    - name: Verify candidate artifact metadata
      shell: bash
      run: |
        bash .github/scripts/verify_candidate_image.sh \
          --image-ref "${{ needs.prepare.outputs.image_name }}@${{ needs.resolve-candidate-artifact.outputs.candidate_digest }}" \
          --expected-description "${{ needs.prepare.outputs.image_description }}" \
          --expected-revision "${{ needs.prepare.outputs.full_sha }}" \
          --expected-version "${{ needs.prepare.outputs.version }}" \
          --expected-source "${{ needs.prepare.outputs.source_url }}" \
          --expected-title "${{ env.IMAGE_TITLE }}"

    - name: Verify candidate metadata bundle
      shell: bash
      run: |
        bash .github/scripts/verify_candidate_metadata_bundle.sh \
          --image-ref "${{ needs.prepare.outputs.image_name }}@${{ needs.resolve-candidate-artifact.outputs.candidate_digest }}" \
          --metadata-repository "${{ needs.prepare.outputs.signature_repository }}" \
          --expected-version "${{ needs.prepare.outputs.version }}" \
          --expected-revision "${{ needs.prepare.outputs.full_sha }}" \
          --expected-source "${{ needs.prepare.outputs.source_url }}"

  publish-release-tags:
    needs: [prepare, resolve-candidate-artifact, verify-candidate-artifact]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up crane
      uses: ./.github/actions/setup-crane
      with:
        install-dir: ${{ runner.temp }}/bin

    - name: Log in to GHCR with crane
      shell: bash
      run: crane auth login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"

    - name: Attach immutable release tags
      shell: bash
      run: |
        tags=("${{ needs.prepare.outputs.release_image_tag }}")
        if [[ "${{ needs.prepare.outputs.release_type }}" == "stable" ]]; then
          tags+=("${{ needs.prepare.outputs.major_minor }}")
        else
          tags+=("${{ needs.prepare.outputs.prerelease_series }}")
        fi

        args=()
        for tag in "${tags[@]}"; do
          args+=(--tag "$tag")
        done

        bash .github/scripts/promote_container_image.sh \
          --image-name "${{ needs.prepare.outputs.image_name }}" \
          --source-digest "${{ needs.resolve-candidate-artifact.outputs.candidate_digest }}" \
          "${args[@]}"

  promote-channel-tags:
    needs: [prepare, resolve-candidate-artifact, publish-release-tags]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up crane
      uses: ./.github/actions/setup-crane
      with:
        install-dir: ${{ runner.temp }}/bin

    - name: Log in to GHCR with crane
      shell: bash
      run: crane auth login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"

    - name: Promote channel tag
      shell: bash
      run: |
        bash .github/scripts/promote_container_image.sh \
          --image-name "${{ needs.prepare.outputs.image_name }}" \
          --source-digest "${{ needs.resolve-candidate-artifact.outputs.candidate_digest }}" \
          --tag "${{ needs.prepare.outputs.release_type }}"

  upload-metadata-release-assets:
    needs: [prepare, resolve-candidate-artifact, publish-release-tags]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up ORAS
      uses: ./.github/actions/setup-oras
      with:
        install-dir: ${{ runner.temp }}/bin

    - name: Log in to GHCR with ORAS
      shell: bash
      run: oras login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"

    - name: Pull metadata bundle
      shell: bash
      run: |
        metadata_tag="$(bash .github/scripts/metadata_bundle_tag.sh --image-digest "${{ needs.resolve-candidate-artifact.outputs.candidate_digest }}")"
        oras pull "${{ needs.prepare.outputs.signature_repository }}:${metadata_tag}" --output "${{ runner.temp }}/metadata-bundle"

    - name: Upload bundle files to GitHub release assets
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      shell: bash
      run: |
        gh release upload "${{ github.event.release.tag_name }}" --clobber \
          "${{ runner.temp }}/metadata-bundle/metadata.json" \
          "${{ runner.temp }}/metadata-bundle/provenance/intoto.jsonl" \
          "${{ runner.temp }}/metadata-bundle/sbom/linux-amd64.spdx.json" \
          "${{ runner.temp }}/metadata-bundle/sbom/linux-arm64.spdx.json"

  sign-and-attest:
    needs: [prepare, resolve-candidate-artifact, promote-channel-tags]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
    - name: Install Cosign
      uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

    - name: Log in to GHCR
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Sign promoted digest
      shell: bash
      env:
        COSIGN_REPOSITORY: ${{ needs.prepare.outputs.signature_repository }}
      run: cosign sign --yes "${{ needs.prepare.outputs.image_name }}@${{ needs.resolve-candidate-artifact.outputs.candidate_digest }}"

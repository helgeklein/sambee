name: "Release: Publish Docker Image"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TRIVY_VERSION: v0.68.2
  TRIVY_IMAGE: aquasec/trivy:0.68.2
  TRIVY_IGNORE_FILE: ./.trivyignore.yaml

on:
  release:
    types: [ published ]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing immutable Git tag to publish, for example v0.7.0. Optional when publish_version_override is set.
        required: false
        type: string
      publish_version_override:
        description: Optional test-only version override to publish instead of the checked-out VERSION value
        required: false
        type: string
      push_latest:
        description: Also publish the latest tag
        required: true
        type: boolean
        default: false

concurrency:
  group: publish-docker-image-${{ github.event_name == 'workflow_dispatch' && (inputs.release_tag || github.sha) || github.event.release.tag_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.release.outputs.release_tag }}
      checkout_ref: ${{ steps.release.outputs.checkout_ref }}
      source_ref_name: ${{ steps.release.outputs.source_ref_name }}
      push_latest: ${{ steps.release.outputs.push_latest }}
      version_override: ${{ steps.release.outputs.version_override }}
      version: ${{ steps.version.outputs.version }}
      major_minor: ${{ steps.version.outputs.major_minor }}
      image_name: ${{ steps.version.outputs.image_name }}
      short_sha: ${{ steps.version.outputs.short_sha }}
    steps:
    - name: Resolve release inputs
      id: release
      shell: bash
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          release_tag="$(printf '%s' "${{ inputs.release_tag }}" | tr -d '[:space:]')"
          push_latest="${{ inputs.push_latest }}"
          version_override="$(printf '%s' "${{ inputs.publish_version_override }}" | tr -d '[:space:]')"

          if [[ -n "$version_override" ]] && ! [[ "$version_override" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "publish_version_override must use major.minor.patch with optional prerelease or build metadata, for example 0.1.0-test1" >&2
            exit 1
          fi

          if [[ -n "$version_override" ]]; then
            if [[ -n "$release_tag" ]]; then
              checkout_ref="$release_tag"
              source_ref_name="$release_tag"
            else
              checkout_ref="${GITHUB_SHA}"
              source_ref_name="${GITHUB_REF_NAME}@${GITHUB_SHA:0:7}"
            fi
          else
            if [[ -z "$release_tag" ]]; then
              echo "release_tag is required unless publish_version_override is set" >&2
              exit 1
            fi
            checkout_ref="$release_tag"
            source_ref_name="$release_tag"
          fi
        else
          release_tag="${{ github.event.release.tag_name }}"
          if [[ "${{ github.event.release.prerelease }}" == "true" ]]; then
            push_latest=false
          else
            push_latest=true
          fi
          version_override=""
          checkout_ref="$release_tag"
          source_ref_name="$release_tag"
        fi

        if [[ -n "$version_override" && "$push_latest" == "true" ]]; then
          echo "publish_version_override cannot be combined with push_latest=true" >&2
          exit 1
        fi

        echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
        echo "checkout_ref=$checkout_ref" >> "$GITHUB_OUTPUT"
        echo "source_ref_name=$source_ref_name" >> "$GITHUB_OUTPUT"
        echo "push_latest=$push_latest" >> "$GITHUB_OUTPUT"
        echo "version_override=$version_override" >> "$GITHUB_OUTPUT"

    - name: Checkout tagged code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        ref: ${{ steps.release.outputs.checkout_ref }}

    - name: Validate version contract
      id: version
      shell: bash
      run: |
        source_version="$(tr -d '[:space:]' < VERSION)"
        version_override="${{ steps.release.outputs.version_override }}"

        if [[ -n "$version_override" ]]; then
          version="$version_override"
          printf '%s\n' "$version" > VERSION
          ./scripts/sync-version
        else
          version="$source_version"
          expected_tag="v$version"
          if [[ "${{ steps.release.outputs.release_tag }}" != "$expected_tag" ]]; then
            echo "Release tag ${expected_tag} expected, got ${{ steps.release.outputs.release_tag }}" >&2
            exit 1
          fi
        fi

        major_minor="$(printf '%s' "$version" | cut -d. -f1-2)"
        owner_lower="$(printf '%s' "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
        short_sha="$(git rev-parse --short HEAD)"

        echo "version=$version" >> "$GITHUB_OUTPUT"
        echo "major_minor=$major_minor" >> "$GITHUB_OUTPUT"
        echo "image_name=ghcr.io/$owner_lower/sambee" >> "$GITHUB_OUTPUT"
        echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"

  validate:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout tagged code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        ref: ${{ needs.prepare.outputs.checkout_ref }}

    - name: Sync and verify version metadata
      if: ${{ needs.prepare.outputs.version_override == '' }}
      uses: ./.github/actions/sync-version-check

    - name: Apply manual version override
      if: ${{ needs.prepare.outputs.version_override != '' }}
      shell: bash
      run: |
        printf '%s\n' '${{ needs.prepare.outputs.version_override }}' > VERSION
        ./scripts/sync-version

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: '3.13.12'
        cache: 'pip'
        cache-dependency-path: 'backend/requirements*.txt'

    - name: Install backend system dependencies
      run: sudo bash scripts/install-system-deps

    - name: Install backend test dependencies
      run: python -m pip install --require-hashes -r backend/requirements-dev.lock.txt

    - name: Generate backend test images
      run: QUIET=1 scripts/setup-test-images

    - name: Run backend type checks
      run: cd backend && mypy app

    - name: Run backend tests
      env:
        SECRET_KEY: test-secret-key-for-ci-only-not-for-production-use
        ENCRYPTION_KEY: YYFPojCh_1WUExv5xXVEyFe0ITw_5dgZZ-fC-iZk3nU=
      run: cd backend && pytest -n auto -v

    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      run: cd frontend && npm ci --prefer-offline

    - name: Run frontend type checks
      run: cd frontend && npx tsc --noEmit

    - name: Run frontend tests
      run: cd frontend && npm test -- --run

    - name: Write build metadata files
      shell: bash
      run: git rev-parse --short HEAD > GIT_COMMIT

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

    - name: Build release validation image
      uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
      with:
        context: .
        file: ./Dockerfile
        load: true
        platforms: linux/amd64
        tags: sambee:release-validation
        cache-from: type=gha,scope=publish-docker-image
        cache-to: type=gha,mode=max,scope=publish-docker-image

    - name: Start release validation container
      shell: bash
      run: |
        docker run -d \
          --name sambee-release-smoke \
          -p 8000:8000 \
          -e SECRET_KEY=test-secret-key-for-ci-only-not-for-production-use \
          -e ENCRYPTION_KEY=YYFPojCh_1WUExv5xXVEyFe0ITw_5dgZZ-fC-iZk3nU= \
          sambee:release-validation

    - name: Wait for release health endpoint
      shell: bash
      run: |
        for attempt in $(seq 1 60); do
          if ! docker container inspect sambee-release-smoke >/dev/null 2>&1; then
            echo "Validation container disappeared before health check completed" >&2
            exit 1
          fi

          if [[ "$(docker inspect -f '{{.State.Running}}' sambee-release-smoke)" != "true" ]]; then
            echo "Validation container exited before /api/health became ready" >&2
            docker logs sambee-release-smoke || true
            exit 1
          fi

          if curl --fail --silent http://127.0.0.1:8000/api/health >/dev/null; then
            exit 0
          fi
          sleep 2
        done

        echo "Timed out waiting for /api/health" >&2
        docker logs sambee-release-smoke || true
        exit 1

    - name: Show Trivy version
      shell: bash
      run: docker run --rm "${TRIVY_IMAGE}" --version

    - name: Scan release image before publish
      shell: bash
      run: |
        set +e

        docker run --rm \
          -v /var/run/docker.sock:/var/run/docker.sock \
          -v "$PWD:/work" \
          -w /work \
          "${TRIVY_IMAGE}" image \
          --ignorefile "${TRIVY_IGNORE_FILE}" \
          --show-suppressed \
          --severity HIGH,CRITICAL \
          --ignore-unfixed \
          --vuln-type os,library \
          --format table \
          --exit-code 1 \
          sambee:release-validation

        scan_status=$?
        set -e

        if [[ "$scan_status" -eq 0 ]]; then
          exit 0
        fi

        if [[ '${{ needs.prepare.outputs.version_override }}' != '' ]]; then
          echo "::warning::Trivy found HIGH or CRITICAL vulnerabilities in this override-based test publish. The findings are advisory for test publishes and publication will continue."
          exit 0
        fi

        echo "Trivy found HIGH or CRITICAL vulnerabilities in a release or tag-based publish candidate." >&2
        exit "$scan_status"

    - name: Print validation container logs on failure
      if: failure()
      shell: bash
      run: |
        if docker container inspect sambee-release-smoke >/dev/null 2>&1; then
          docker logs sambee-release-smoke
        else
          echo "Validation container is no longer available for log collection"
        fi

    - name: Clean up release validation container
      if: always()
      shell: bash
      run: docker rm -f sambee-release-smoke || true

  publish:
    needs: [prepare, validate]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
    - name: Checkout tagged code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        ref: ${{ needs.prepare.outputs.checkout_ref }}

    - name: Apply manual version override
      if: ${{ needs.prepare.outputs.version_override != '' }}
      shell: bash
      run: |
        printf '%s\n' '${{ needs.prepare.outputs.version_override }}' > VERSION
        ./scripts/sync-version

    - name: Write build metadata files
      shell: bash
      run: git rev-parse --short HEAD > GIT_COMMIT

    - name: Prepare image tags and labels
      id: image
      shell: bash
      run: |
        created="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
        tags=(
          "${{ needs.prepare.outputs.image_name }}:${{ needs.prepare.outputs.version }}"
          "${{ needs.prepare.outputs.image_name }}:${{ needs.prepare.outputs.major_minor }}"
          "${{ needs.prepare.outputs.image_name }}:sha-${{ needs.prepare.outputs.short_sha }}"
        )

        if [[ "${{ needs.prepare.outputs.push_latest }}" == "true" ]]; then
          tags+=("${{ needs.prepare.outputs.image_name }}:latest")
        fi

        {
          echo 'tags<<EOF'
          printf '%s\n' "${tags[@]}"
          echo 'EOF'
        } >> "$GITHUB_OUTPUT"

        {
          echo 'labels<<EOF'
          echo "org.opencontainers.image.created=$created"
          echo "org.opencontainers.image.description=Browser-based SMB and local drive access with a built frontend and Python backend"
          echo "org.opencontainers.image.licenses=MIT"
          echo "org.opencontainers.image.ref.name=${{ needs.prepare.outputs.source_ref_name }}"
          echo "org.opencontainers.image.revision=${GITHUB_SHA}"
          echo "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}"
          echo "org.opencontainers.image.title=Sambee"
          echo "org.opencontainers.image.url=https://github.com/${GITHUB_REPOSITORY}"
          echo "org.opencontainers.image.version=${{ needs.prepare.outputs.version }}"
          echo 'EOF'
        } >> "$GITHUB_OUTPUT"

    - name: Log in to GHCR
      uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

    - name: Build and push image
      id: build
      uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
      with:
        context: .
        file: ./Dockerfile
        platforms: linux/amd64
        push: true
        tags: ${{ steps.image.outputs.tags }}
        labels: ${{ steps.image.outputs.labels }}
        cache-from: type=gha,scope=publish-docker-image
        cache-to: type=gha,mode=max,scope=publish-docker-image
        provenance: true
        sbom: true

    - name: Install Cosign
      uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

    - name: Sign published image
      shell: bash
      run: cosign sign --yes "${{ needs.prepare.outputs.image_name }}@${{ steps.build.outputs.digest }}"

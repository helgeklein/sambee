name: Check Backend Lockfiles

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main ]
    paths:
      - backend/requirements.txt
      - backend/requirements-dev.txt
      - backend/requirements.lock.txt
      - backend/requirements-dev.lock.txt
      - scripts/refresh-backend-lockfiles
      - .github/workflows/check-backend-lockfiles.yml
  pull_request:
    branches: [ main ]
    paths:
      - backend/requirements.txt
      - backend/requirements-dev.txt
      - backend/requirements.lock.txt
      - backend/requirements-dev.lock.txt
      - scripts/refresh-backend-lockfiles
      - .github/workflows/check-backend-lockfiles.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-lockfiles:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.13.12'
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
            scripts/refresh-backend-lockfiles

      - name: Verify backend lockfiles are fresh
        run: scripts/refresh-backend-lockfiles --check
name: Setup Crane
description: Install the reviewed crane version from the pinned Go tool manifest.

inputs:
  install-dir:
    description: Directory where the crane binary should be installed.
    required: true

runs:
  using: composite
  steps:
    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: .github/tools/crane/go.mod
        cache: true
        cache-dependency-path: .github/tools/crane/go.mod

    - name: Install crane
      shell: bash
      run: |
        bash .github/scripts/install_crane.sh "${{ inputs.install-dir }}"
        echo "${{ inputs.install-dir }}" >> "$GITHUB_PATH"

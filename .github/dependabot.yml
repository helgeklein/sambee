version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: pip
    directory: "/backend"
    schedule:
      interval: weekly
      day: monday
      time: "05:10"
      timezone: UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python
    groups:
      backend-python:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: weekly
      day: monday
      time: "05:20"
      timezone: UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - frontend
    groups:
      frontend-npm:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: "/companion"
    schedule:
      interval: weekly
      day: monday
      time: "05:30"
      timezone: UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - companion
    groups:
      companion-npm:
        patterns:
          - "*"

  - package-ecosystem: cargo
    directory: "/companion/src-tauri"
    schedule:
      interval: weekly
      day: monday
      time: "05:40"
      timezone: UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - rust
    groups:
      companion-rust:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "05:50"
      timezone: UTC
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - docker
    ignore:
      # Keep production runtime versions aligned with the repo-wide tested baselines.
      # Node/Python version upgrades should be coordinated across Docker, CI,
      # local development, tooling, and documentation instead of arriving as
      # isolated Dependabot PRs.
      - dependency-name: "node"
      - dependency-name: "python"
    groups:
      root-docker:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: "/.devcontainer"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - devcontainer
    ignore:
      # Keep the devcontainer interpreter aligned with the repo-wide Python version.
      # Python version upgrades should be done deliberately across devcontainer, CI,
      # tooling, and documentation rather than via an isolated Dependabot PR.
      - dependency-name: "mcr.microsoft.com/devcontainers/python"
    groups:
      devcontainer-docker:
        patterns:
          - "*"

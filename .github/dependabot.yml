version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: pip
    directory: "/backend"
    schedule:
      interval: weekly
      day: monday
      time: "05:10"
      timezone: UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python
    groups:
      backend-python-dev-tools:
        patterns:
          - "black"
          - "faker"
          - "httpx"
          - "ipython"
          - "mypy"
          - "pytest"
          - "pytest-*"
          - "rich"
          - "ruff"
      backend-python-runtime:
        patterns:
          - "*"
        exclude-patterns:
          - "black"
          - "faker"
          - "httpx"
          - "ipython"
          - "mypy"
          - "pytest"
          - "pytest-*"
          - "rich"
          - "ruff"

  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: weekly
      day: monday
      time: "05:20"
      timezone: UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - frontend
    ignore:
      # Frontend framework, routing, localization, compiler, markdown-rendering,
      # test-runtime, and build-tool major upgrades require coordinated
      # validation across the app runtime and test stack. Keep those upgrades
      # manual instead of isolated Dependabot PRs.
      - dependency-name: "@mui/icons-material"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "@mui/material"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "react"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "react-dom"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "react-i18next"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "react-markdown"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "react-router-dom"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "i18next"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "typescript"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "jsdom"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "@vitejs/plugin-react"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "vite"
        update-types:
          - "version-update:semver-major"
    groups:
      frontend-npm:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: "/companion"
    schedule:
      interval: weekly
      day: monday
      time: "05:30"
      timezone: UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - companion
    ignore:
      # Companion build-tool, localization, compiler, and test-runtime major
      # upgrades should be upgraded deliberately with manual testing.
      - dependency-name: "i18next"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "jsdom"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "@preact/preset-vite"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "typescript"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "vite"
        update-types:
          - "version-update:semver-major"
    groups:
      companion-npm:
        patterns:
          - "*"

  - package-ecosystem: cargo
    directory: "/companion/src-tauri"
    schedule:
      interval: weekly
      day: monday
      time: "05:40"
      timezone: UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - rust
    groups:
      companion-rust:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "05:50"
      timezone: UTC
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - docker
    ignore:
      # Keep production runtime versions aligned with the repo-wide tested
      # baselines. Node/Python version upgrades should be coordinated across
      # Docker, CI, local development, tooling, and documentation instead of
      # arriving as isolated Dependabot PRs.
      - dependency-name: "node"
      - dependency-name: "python"
    groups:
      root-docker:
        patterns:
          - "*"


# Sambee Configuration File (Optional)
# All security secrets are auto-generated and stored in the database.
# This file is only needed for customizing application behavior.
#
# Copy this file to config.toml to customize settings:
#   cp config.example.toml config.toml

[app]
# Backend log level: DEBUG, INFO, WARNING, ERROR (case-insensitive)
log_level = "INFO"

[security]
# Authentication method: "password" or "none"
# - password: Standard username/password authentication (default)
# - none: No authentication required (use only if reverse proxy handles authentication)
auth_method = "password"

# JWT token expiration time in minutes (default: 24 hours)
access_token_expire_minutes = 1440

[admin]
# Initial admin account username
username = "admin"

[image_viewer]
# Conversion size threshold: images larger than this are always converted for viewing
# conv_size_thresh = 512000

[frontend_logging]
# Enable frontend logging globally (default: false)
# enabled = false

# Delete frontend logs older than this many hours (default: 1)
# log_retention_hours = 1

# Frontend log level: DEBUG, INFO, WARNING, ERROR (case-insensitive)
# log_level = "ERROR"

# Log components (comma-separated, empty = all components)
# Examples: ImageViewer, ImageLoader, Swiper
# log_components = ""

# Username regex filter - only log for users matching this regex (default: empty = all users)
# Examples:
#   username_regex = "^admin$"           # Only admin user
#   username_regex = "^(admin|developer)$"  # admin or developer
#   username_regex = "^test"             # Any username starting with "test"
#   username_regex = ""                  # All users (when enabled = true)
# username_regex = ""
